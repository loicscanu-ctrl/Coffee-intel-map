[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    "scraper/quant_model",
    "**/__pycache__",
]

[tool.ruff.lint]
# Conservative starter set — flag obvious bugs and dead imports without
# forcing a stylistic rewrite. Expand once the codebase is clean.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (undefined names, unused imports)
    "W",   # pycodestyle warnings
    "B",   # flake8-bugbear
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line length — many SQLAlchemy column declarations exceed 120
    "E402",  # module-level import not at top — used for sys.path tweaks
    "B008",  # function call in default arg — FastAPI Depends() pattern
]

[tool.ruff.lint.per-file-ignores]
"scraper/sources/futures.py" = ["E741"]  # 'l' as loop var in column maps
