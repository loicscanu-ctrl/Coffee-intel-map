name: "3.1 – Kaffeesteuer Scraper"

on:
  schedule:
    # 1st of each month at 08:00 UTC
    # Reports are published on the 20th-23rd of the month after → safe buffer
    - cron: "0 8 1 * *"
  workflow_dispatch:   # allow manual trigger

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # sqlalchemy/psycopg2/dotenv/jinja2 are needed for the news-feed
        # commentary badge the scraper emits at the tail of main(). The upsert
        # is a no-op when DATABASE_URL is unset.
        run: pip install requests pdfplumber beautifulsoup4 lxml sqlalchemy psycopg2-binary python-dotenv jinja2

      - name: Run Kaffeesteuer scraper (3 attempts)
        env:
          # When set, the scraper writes a news_feed row with the monthly
          # commentary badge. Workflow 1.4 (export-and-publish) then promotes
          # that badge to a top-level `commentary` field in news.json.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          for attempt in 1 2 3; do
            python -m scraper.fetch_kaffeesteuer && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Validate output
        run: |
          python -c "
          import json, sys, subprocess
          sys.path.insert(0, 'backend')
          from scraper.validate_export import validate_kaffeesteuer
          data = json.load(open('frontend/public/data/kaffeesteuer.json'))
          ok, reason = validate_kaffeesteuer(data)
          if not ok:
              print(f'[validate] kaffeesteuer.json FAILED: {reason} — restoring HEAD version')
              subprocess.run(['git', 'checkout', '--', 'frontend/public/data/kaffeesteuer.json'])
          "

      - name: Commit updated JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/kaffeesteuer.json
          git diff --cached --quiet \
            && echo "No changes — JSON already up to date." \
            || (git commit -m "data: update kaffeesteuer.json [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
