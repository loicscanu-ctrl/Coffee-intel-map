name: Backend lint

# Runs ruff on backend/ for every PR that touches Python files there.
# The config (rule selection + ignores) lives in backend/pyproject.toml.

on:
  pull_request:
    paths:
      - 'backend/**/*.py'
      - 'backend/pyproject.toml'
      - '.github/workflows/lint-backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**/*.py'
      - 'backend/pyproject.toml'
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet ruff

      - name: ruff check
        working-directory: backend
        run: ruff check .
