name: "1.15 – Monthly CPI Scraper (US CPI · Retail Coffee CPI)"

# CPI sources publish monthly, so they don't belong in the daily news scraper
# (where they re-fetched the same numbers ~30×/month). This workflow runs them
# on a schedule that tracks the actual releases.

on:
  schedule:
    # US BLS CPI-U drops ~08:30 ET (12:30/13:30 UTC) on a day between the
    # 10th–18th; Brazil BCB IPCA lands ~10th; Eurostat HICP mid-month. Run a
    # mid-month daily window at 13:40 UTC (after the BLS release) so each is
    # picked up within a day of publication — the exporter only commits when
    # the numbers actually change, so the extra runs are cheap no-ops.
    - cron: '40 13 10-18 * *'
    # 1st-of-month backstop for any late or missed release.
    - cron: '0 3 1 * *'
  workflow_dispatch:

# Serialize against the other workflows that push to main's data files.
concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  cpi:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      # No Playwright: both CPI sources are plain HTTP/JSON APIs.
      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Run CPI scrapers
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional: lifts the BLS API window from 10 to 20 years. Works
          # without it (keyless access allows 25 queries/day).
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python -m scraper.cpi_scraper

      - name: Export CPI static JSON
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python -m scraper.export_static_json --only us_cpi,retail_cpi

      - name: Commit updated CPI JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
                  frontend/public/data/us_cpi.json \
                  frontend/public/data/retail_cpi.json \
                  frontend/public/data/health.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: monthly CPI update [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
