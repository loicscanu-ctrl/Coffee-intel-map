name: "2.3 – COT Scraper"

on:
  schedule:
    # Run every weekday at 21:00 UTC. CFTC releases the COT at 15:30 ET, which
    # is 19:30 UTC (summer) / 20:30 UTC (winter) — 21:00 clears both. The
    # "Decide" step below gates the actual pull to the real release day using a
    # US-federal-holiday calendar, so on a normal week only Friday runs, and a
    # holiday-delayed release (e.g. Juneteenth on a Friday → release shifts to
    # Monday) is picked up automatically on the day it lands instead of waiting
    # a full week. The gate carries a 1-day grace window: GH fires crons hours
    # late, so the Friday 21:00 run often lands after midnight (Saturday on the
    # runner) — grace lets that slipped run still catch the release instead of
    # skipping the whole week. Non-release weekdays are cheap no-op skips.
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      # Gate: only pull on the day the CFTC report is actually due — the normal
      # Friday, or the holiday-shifted business day (stdlib-only, no deps yet).
      # Manual workflow_dispatch always proceeds (used for backfills/re-runs).
      - name: Decide whether a COT release is due today
        id: decide
        working-directory: backend
        run: python -m scraper.cot_calendar

      - name: Install Python dependencies
        if: ${{ github.event_name == 'workflow_dispatch' || steps.decide.outputs.due == 'true' }}
        working-directory: backend
        # jinja2 added so `_cot_commentary` can render the news-feed badge.
        run: pip install sqlalchemy psycopg2-binary pandas requests yfinance python-dotenv jinja2

      - name: Run macro COT scraper (3 attempts)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.decide.outputs.due == 'true' }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_cot && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Run Coffee COT scraper (3 attempts)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.decide.outputs.due == 'true' }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_cot_coffee && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      # Set cot_weekly prices + contract labels from the per-contract archive
      # (true max-OI). Replaces the standalone Tuesday price fetch (old 2.1):
      # by Friday the daily OI snapshot (1.3) has filled this week's Tuesday
      # OI + price into the archive, so the rebuild sets the latest COT-Tuesday
      # price here. Idempotent; only changed rows are written.
      - name: Rebuild COT prices from archive (true max-OI)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.decide.outputs.due == 'true' }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/rebuild_cot_prices_from_archive.py --apply

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
