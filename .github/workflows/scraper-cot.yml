name: COT Scraper (Positions + Prices)

on:
  schedule:
    # 20:00 UTC Friday = 3:00 PM ET winter / 4:00 PM ET summer
    # CFTC releases every Friday at 3:30 PM ET — run at 20:00 UTC, retry manually if data not yet published.
    - cron: '0 20 * * 5'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install sqlalchemy psycopg2-binary pandas requests yfinance python-dotenv

      - name: Run COT scraper
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.run_cot
