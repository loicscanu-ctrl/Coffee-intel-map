name: "2.3 – COT Scraper"

on:
  schedule:
    # 21:30 UTC Friday. CFTC publishes every Friday at 3:30 PM ET, which is
    # 20:30 UTC in summer (EDT) and 19:30 UTC in winter (EST). 21:30 UTC sits
    # 1h after the latest publish window year-round, so the run never misses
    # that week's data. (Prior 20:00 UTC schedule fired 30 min BEFORE summer
    # publish and was a silent no-op every other week — daily macro_cot had
    # been the de-facto safety net.)
    # Sole owner of COT positions writes — daily scraper no longer touches
    # commodity_cot, so if this misses a week, downstream goes stale until
    # the next Friday.
    - cron: '30 21 * * 5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install sqlalchemy psycopg2-binary pandas requests yfinance python-dotenv

      - name: Run macro COT scraper (3 attempts)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_cot && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Run Coffee COT scraper (3 attempts)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_cot_coffee && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
