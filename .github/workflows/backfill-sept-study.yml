name: "9.5 – Backfill September X-ray CFTC history (one-off)"

# One-off deep-history backfill for the Research "September X-ray" study:
# downloads the CFTC disaggregated futures-only archives (hist 2006-2016 +
# yearly) and rebuilds sept_positioning.json with the full ~20-September
# history. The exporter caches fetched years append-once (source "cftc"),
# so after one successful run the nightly export only refreshes the current
# year. Safe to re-run any time. No DB needed — the exporter is derived
# (reads the committed static JSONs + fetches CFTC over plain HTTPS).

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run September X-ray backfill (stdlib only)
        working-directory: backend
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scraper.exporters.cot_sept_study import export_cot_sept_study
          export_cot_sept_study()
          "

      - name: Commit backfilled history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/sept_positioning.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: September X-ray CFTC deep backfill (2006+) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
