name: "0.9 – Daily — ENSO thermocline (TAO/TRITON 150m · NDBC .ocean)"

# Fetches subsurface temperature at ~150 m depth from the TAO/TRITON
# moored buoy network in the equatorial Pacific Niño 3.4 box. The
# Phase 2 WWV card is depth-integrated (4-6 MONTH lead); this is the
# depth-resolved companion — warm anomalies at 150 m propagating
# eastward ARE Kelvin waves, which surface as El Niño 4-6 WEEKS later.
#
# Pulls 7 specific NDBC stations anchored inside the Niño 3.4 box
# (5°N-5°S, 170°W-120°W) along three longitudes. Each station's
# .ocean realtime file is fetched independently — one buoy offline
# doesn't block the others (graceful "no-data" slot in the JSON).
#
# DATA SOURCE — NDBC realtime2 (pivoted from ERDDAP after PR #441):
#   PMEL ERDDAP decommissioned, OSMC/PFEG mirrors blacklist GHA IPs,
#   so we go straight to the upstream operational feed at NDBC. Flat
#   text files, no WAF, no auth — verified live on 23 Jun 2026.
#
# Daily cron — NDBC realtime updates every 10-60 minutes per buoy
# and the .ocean files keep ~45 days of rolling history. Daily is
# plenty for a 4-6 WEEK signal and avoids burning runner minutes
# fetching the same data hourly.

on:
  schedule:
    - cron: '0 7 * * *'     # Every day at 07:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean
      diag:
        description: "Log the head of each fetched .ocean file (debug format drift)."
        required: false
        default: false
        type: boolean

jobs:
  fetch-enso-thermocline:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch TAO/TRITON subsurface T from NDBC
        id: fetch
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DIAG: ${{ inputs.diag }}
        run: |
          set -e
          ARGS=""
          if [ "$DRY_RUN" != "true" ]; then
            ARGS="$ARGS --write"
          fi
          if [ "$DIAG" = "true" ]; then
            ARGS="$ARGS --diag"
          fi
          cd backend
          PYTHONPATH=. python -m scraper.sources.enso_thermocline $ARGS

      - name: Commit updated enso_thermocline.json if changed
        if: ${{ inputs.dry_run != true }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f frontend/public/data/enso_thermocline.json ]; then
            echo "No enso_thermocline.json produced — nothing to commit."
            exit 0
          fi
          git add frontend/public/data/enso_thermocline.json
          if git diff --cached --quiet; then
            echo "No thermocline change."
            exit 0
          fi
          git commit -m "data: ENSO thermocline (TAO/TRITON 150m via NDBC) refresh $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed (NDBC unreachable or all 7 buoys offline) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
