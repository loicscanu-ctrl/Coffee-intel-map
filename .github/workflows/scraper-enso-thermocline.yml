name: "0.9 – Daily — ENSO thermocline (TAO/TRITON 150m · ERDDAP via CF proxy)"

# Fetches subsurface temperature at ~150 m depth from the TAO/TRITON
# moored buoy network. Depth-RESOLVED companion to Phase 2's WWV card
# (which is depth-integrated, 4-6 month lead). Warm anomalies at 150 m
# propagating eastward ARE Kelvin waves, surface as El Niño 4-6 weeks
# later.
#
# DATA PATH (v5):
#   GHA runner → CF Worker (erddap-proxy) → NOAA ERDDAP (PFEG / OSMC)
#
# Why the proxy: NOAA's CoastWatch PFEG + OSMC ERDDAPs blacklist GHA
# egress IPs (Azure ASNs). Cloudflare Workers' egress isn't on the
# blacklist, so a CF Worker just forwards the request and reads the
# response back. ~50 LOC, free tier covers our volume, shared-secret
# header keeps it from being abused. See cf-worker/README.md.
#
# Path history:
#   v1+v2 (#436, #437): direct ERDDAP — IP-blacklisted
#   v3+v4 (#442, #443): pivot to NDBC — NDBC doesn't host TAO at all
#   v5    (this):       proxy + back to ERDDAP — actual TAO data path

on:
  # Cron stays DISABLED until the operator (a) deploys the CF Worker
  # per cf-worker/README.md, (b) sets ERDDAP_PROXY_BASE (vars) +
  # ERDDAP_PROXY_SECRET (secrets) in repo settings, and (c) confirms
  # one successful manual dispatch. Then uncomment the schedule.
  # schedule:
  #   - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean
      diag:
        description: "Log the head of each fetched .ocean file (debug format drift)."
        required: false
        default: false
        type: boolean

jobs:
  fetch-enso-thermocline:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch TAO/TRITON subsurface T via Cloudflare Worker proxy
        id: fetch
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DIAG: ${{ inputs.diag }}
          # v5 — pivoted from NDBC (which doesn't host TAO) back to ERDDAP,
          # routed through a CF Worker that bypasses NOAA's GHA-IP blacklist.
          # See cf-worker/README.md for deployment. If either var is empty
          # the Python exits with code 2 (config error), the workflow fails
          # fast, and the operator gets a clear "set the secrets" message.
          ERDDAP_PROXY_BASE:   ${{ vars.ERDDAP_PROXY_BASE }}
          ERDDAP_PROXY_SECRET: ${{ secrets.ERDDAP_PROXY_SECRET }}
        run: |
          set -e
          ARGS=""
          if [ "$DRY_RUN" != "true" ]; then
            ARGS="$ARGS --write"
          fi
          if [ "$DIAG" = "true" ]; then
            ARGS="$ARGS --diag"
          fi
          cd backend
          PYTHONPATH=. python -m scraper.sources.enso_thermocline $ARGS

      - name: Commit updated enso_thermocline.json if changed
        if: ${{ inputs.dry_run != true }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f frontend/public/data/enso_thermocline.json ]; then
            echo "No enso_thermocline.json produced — nothing to commit."
            exit 0
          fi
          git add frontend/public/data/enso_thermocline.json
          if git diff --cached --quiet; then
            echo "No thermocline change."
            exit 0
          fi
          git commit -m "data: ENSO thermocline (TAO/TRITON 150m via NDBC) refresh $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed (NDBC unreachable or all 7 buoys offline) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
