name: "0.9 – Weekly — ENSO thermocline (TAO/TRITON 150m · NOAA PMEL ERDDAP)"

# Fetches subsurface temperature at ~150 m depth from the TAO/TRITON
# moored buoy network in the equatorial Pacific. The trader signal:
# warm anomalies at 150 m propagating eastward along the equator ARE
# Kelvin waves, which surface as El Niño 4-6 WEEKS later. This is
# the fast-horizon complement to the Phase 2 WWV card (4-6 months).
#
# Reads from the PMEL ERDDAP `tabledap` REST endpoint. Multiple
# dataset IDs tried in order — PMEL renames datasets occasionally
# (the Phase 2 PMEL URL 404'd because of just such a rename); the
# URL-candidate pattern rides through that without code changes.
#
# WHY a workflow: ERDDAP at upwell.pmel.noaa.gov is reachable from
# GitHub Actions runners but NOT from the Claude Code sandbox.
# Fetcher runs on runner; sandbox can only inspect what's committed.

on:
  schedule:
    - cron: '0 7 * * 2'     # Tuesday 07:00 UTC — 15min after the WWV workflow
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode — backfill (seed) or refresh (incremental). Functionally identical for ERDDAP."
        required: false
        default: refresh
        type: choice
        options:
          - refresh
          - backfill
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean
      diag:
        description: "Dump head/tail of fetched ERDDAP CSV to the log (debug column drift)."
        required: false
        default: false
        type: boolean

jobs:
  fetch-enso-thermocline:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch TAO/TRITON subsurface T
        id: fetch
        env:
          MODE: ${{ inputs.mode || 'refresh' }}
          DRY_RUN: ${{ inputs.dry_run }}
          DIAG: ${{ inputs.diag }}
        run: |
          set -e
          if [ "$DRY_RUN" = "true" ]; then
            ARGS=""
          else
            ARGS="--write"
          fi
          if [ "$MODE" = "backfill" ]; then
            ARGS="$ARGS --backfill"
          fi
          if [ "$DIAG" = "true" ]; then
            ARGS="$ARGS --diag"
          fi
          cd backend
          # Single attempt — same rationale as Phase 2 v2: the Python
          # walks the dataset-ID candidate list internally and fails
          # fast on deterministic 404s. Re-dispatching after a
          # transient outage is cheap; burning 10 min on retry sleeps
          # for a structural failure is not. Weekly cron handles the
          # next-attempt cadence.
          PYTHONPATH=. python -m scraper.sources.enso_thermocline $ARGS

      - name: Commit updated enso_thermocline.json if changed
        if: ${{ inputs.dry_run != true }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f frontend/public/data/enso_thermocline.json ]; then
            echo "No enso_thermocline.json produced — nothing to commit."
            exit 0
          fi
          git add frontend/public/data/enso_thermocline.json
          if git diff --cached --quiet; then
            echo "No thermocline change."
            exit 0
          fi
          git commit -m "data: ENSO thermocline (TAO/TRITON 150m) refresh $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed (PMEL ERDDAP likely unreachable or schema drifted) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
