name: Monthly Scraper (CONAB + Comex Stat)

on:
  schedule:
    - cron: '0 2 5 * *'   # 02:00 UTC on the 5th of each month
  workflow_dispatch:

jobs:
  scrape-monthly:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests yfinance python-dotenv openpyxl xlrd

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run monthly scraper
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.run_monthly

      - name: Export static JSON files
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Commit updated static JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/farmer_economics.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: update farmer_economics.json [skip ci]" && git pull --rebase origin main && git push)
