name: "3.3 – Monthly Scraper CONAB"

on:
  schedule:
    # TEMPORARY: one-shot probe on May 12, 2026 at 02:00 UTC to check
    # whether MDIC publishes by day 12. Previous schedule was day 23
    # (set in commit history after PR #7's day-18 attempt also returned
    # empty). If May 12 returns fresh data, switch to '0 2 12 * *' for
    # a permanent earlier fetch; if empty, revert to day 23 or push later.
    - cron: '0 2 12 5 *'
  workflow_dispatch:

jobs:
  scrape-monthly:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests yfinance python-dotenv openpyxl xlrd

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run monthly scraper (3 attempts)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_monthly && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
