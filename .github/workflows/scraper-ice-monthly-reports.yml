name: "1.14 – ICE Arabica Ageing (monthly)"

# Dedicated monthly trigger for the C-contract ageing report at
# https://www.ice.com/publicdocs/futures_us_reports/coffee/coffee_aging_YYYYMMDD.xls
#
# The daily ICE scraper (workflow 1.13) already attempts this fetch via
# pull_arabica_ageing(), so the data flows through that path too. This
# workflow exists to give the file a focused run on the day after each
# month-end — clearer signal in the Actions log when the publish lands.

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Backfill window in business days (small — we only need a fresh run, the merge keeps history)"
        required: false
        default: "3"
        type: string
  schedule:
    # Day 1 of every month at 14:00 UTC — after ICE's typical morning
    # publish window. Falls back one month internally if the new file
    # isn't up yet.
    - cron: '0 14 1 * *'

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests 'xlrd<2.0' openpyxl pdfplumber

      - name: Pull ICE certified stocks (includes the ageing report)
        working-directory: backend
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scraper.sources.ice_certified_stocks.orchestrate \
            --days "${{ inputs.days_back || 3 }}"

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/certified_stocks_arabica.json \
                  frontend/public/data/certified_stocks_robusta.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: ICE arabica ageing (monthly) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
