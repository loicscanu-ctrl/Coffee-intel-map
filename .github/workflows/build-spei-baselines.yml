name: "0.4 – One-shot — Build SPEI baselines (Open-Meteo 30-yr archive)"

# Manually-triggered, one-time build of the 30-yr monthly P + ET₀ calibration
# the SPEI calculator needs (backend/seed/spei_30yr_baselines.json).
#
# WHY a workflow (same reasoning as 0.3 / SPI baselines): the build fetches
# 1995–2024 daily precip + Penman-Monteith ET₀ from archive-api.open-meteo.com.
# That host is NOT on the Claude Code sandbox's egress allowlist (403), but
# GitHub's runners have open egress. Mirrors 0.2 (weather baselines).
#
# The baseline is STATIC — build once, commit, done. fetch_origin_weather.py
# then computes SPEI-1/SPEI-3 from this seed + the current month's P + ET₀
# (no archive call at daily runtime). Until this runs, SPEI is simply omitted
# (graceful — same gating as SPI).
#
# NOT scheduled — workflow_dispatch only. Safe to re-run; merges per-origin.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all (brazil colombia honduras indonesia uganda ethiopia vn)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry-run only (preview, no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  build-spei-baselines:
    runs-on: ubuntu-22.04
    # 35 was too tight: the first dispatch (2026-05-30) saw ~30% of archive
    # calls timeout at 180s each, and the runner was killed at 35 min with
    # 19/27 regions fetched but nothing committed. 90 absorbs retries
    # comfortably and leaves headroom for the checkpoint-per-origin writes.
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build SPEI baselines — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS=""
          [ -n "$ORIGINS" ] && ARGS="--origins $ORIGINS"
          python backend/scripts/build_spei_baselines.py $ARGS

      - name: Overlay main's current seed (so a partial build preserves other origins)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          git show origin/main:backend/seed/spei_30yr_baselines.json > backend/seed/spei_30yr_baselines.json 2>/dev/null || true

      - name: Build SPEI baselines — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          echo "=== APPLY — writing backend/seed/spei_30yr_baselines.json ==="
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/build_spei_baselines.py $ARGS

      - name: Commit seed to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp backend/seed/spei_30yr_baselines.json "$RUNNER_TEMP/spei.json"
          git checkout -- backend/seed/spei_30yr_baselines.json 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/spei.json" backend/seed/spei_30yr_baselines.json
          git add backend/seed/spei_30yr_baselines.json
          if git diff --cached --quiet; then
            echo "No change to spei_30yr_baselines.json — seed already current."
            exit 0
          fi
          git commit -m "data: build SPEI 30-yr baselines (Open-Meteo archive) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit the seed."
          else
            echo "SPEI baselines committed. The next weather-fetch run will start emitting spei_1/spei_3 per region."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed (archive host likely unreachable) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
