name: "0.3 – One-shot — Build SPI baselines (Open-Meteo 30-yr archive)"

# Manually-triggered, one-time build of the 30-yr monthly-precip calibration the
# SPI calculator needs (backend/seed/spi_30yr_baselines.json).
#
# WHY a workflow: the build fetches 1995–2024 daily precip from
# archive-api.open-meteo.com. That host is NOT on the Claude Code sandbox's
# egress allowlist (403), but GitHub's runners have open egress — so we build
# here, not locally. Mirrors 0.2 (weather baselines).
#
# The baseline is STATIC — build once, commit, done. fetch_origin_weather.py
# then computes SPI-1/SPI-3 from this seed + the current month's rain (no archive
# call at daily runtime). Until this runs, SPI is simply omitted (graceful).
#
# NOT scheduled — workflow_dispatch only. Safe to re-run; merges per-origin.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all (brazil colombia honduras indonesia uganda ethiopia vn)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry-run only (preview, no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  build-spi-baselines:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build SPI baselines — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS=""
          [ -n "$ORIGINS" ] && ARGS="--origins $ORIGINS"
          python backend/scripts/build_spi_baselines.py $ARGS

      - name: Overlay main's current seed (so a partial build preserves other origins)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          git show origin/main:backend/seed/spi_30yr_baselines.json > backend/seed/spi_30yr_baselines.json 2>/dev/null || true

      - name: Build SPI baselines — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          echo "=== APPLY — writing backend/seed/spi_30yr_baselines.json ==="
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/build_spi_baselines.py $ARGS

      - name: Commit seed to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp backend/seed/spi_30yr_baselines.json "$RUNNER_TEMP/spi.json"
          git checkout -- backend/seed/spi_30yr_baselines.json 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/spi.json" backend/seed/spi_30yr_baselines.json
          git add backend/seed/spi_30yr_baselines.json
          if git diff --cached --quiet; then
            echo "No change to spi_30yr_baselines.json — seed already current."
            exit 0
          fi
          git commit -m "data: build SPI 30-yr baselines (Open-Meteo archive) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit the seed."
          else
            echo "SPI baselines committed. The next weather-fetch run will start emitting spi_1/spi_3 per region."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed (archive host likely unreachable) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
