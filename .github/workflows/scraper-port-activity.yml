name: "1.11 – Port Activity Scraper (PortWatch)"

on:
  schedule:
    # IMF PortWatch refreshes weekly on Tuesdays ~09:00 ET (13:00–14:00 UTC).
    # Run Wednesday 06:17 UTC so the latest week is published. 17 to dodge the
    # GH cron skip on :00 marks.
    - cron: '17 6 * * 3'
  workflow_dispatch:      # allow manual trigger from the GitHub UI

# Serialize with other workflows that push frontend/public/data on main.
concurrency:
  group: scraper-port-activity
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run PortWatch port-activity scraper (3 attempts)
        working-directory: backend
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_port_activity && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Commit updated port activity if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -A stages new, modified, and removed per-port files (and index.json).
          git add -A frontend/public/data/port_activity
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "data: update port activity (PortWatch) [skip ci]"
          # Other workflows also push to main between checkout and push; rebase
          # and retry. Our regenerated JSON is canonical for this file.
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
