name: "z – Trial 15min KC/RC (throwaway probe)"

# One-off verification probe: fetches KC=F and RM=F 15-min bars for ~1 month
# and dumps the per-day data points the open-direction feature needs (KC/RC at
# 17:30, KC at 18:30, RC open+15min, plus archive settles). Confirms whether
# Yahoo robusta INTRADAY (RM=F) actually returns data before we build the real
# 15-min pipeline. Writes frontend/public/data/_trial_15min_kc_rc.json for
# inspection. workflow_dispatch only; safe to delete after.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  trial:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install --quiet requests
      - name: Run 15-min trial
        working-directory: backend
        run: python -m scraper.trial_15min_kc_rc
      - name: Commit trial output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/_trial_15min_kc_rc.json
          git diff --cached --quiet \
            && echo "No trial output." \
            || (git commit -m "trial: 15min KC/RC probe output [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin "${GITHUB_REF_NAME}" \
                && git push origin HEAD:"${GITHUB_REF_NAME}")
