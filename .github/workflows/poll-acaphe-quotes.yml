name: "0.1 – Acaphe Live Quotes Poll"

# Polls acaphe.com via the --once mode of acaphe_poller.py and pushes the
# latest snapshot to Upstash Redis. Runs every 5 minutes — the closest GH
# Actions cron allows. Free for public repos.
#
# Replaces the long-running worker model (Render / laptop) with a cron-
# triggered single fetch, so live quotes stay fresh without paying for a
# 24/7 worker.
#
# Required repo secrets:
#   UPSTASH_REDIS_REST_URL
#   UPSTASH_REDIS_REST_TOKEN
# Optional repo secret (for VN physical-price persistence):
#   DATABASE_URL

on:
  schedule:
    # Every 15 min during trading hours Mon–Fri UTC:
    #   RC London   08:00–18:30 UTC
    #   KC New York 08:30–19:00 UTC
    # Explicit minute list (0,15,30,45) instead of `*/15`: GH Actions has
    # silently throttled the `*/N` form on this workflow before — observed
    # 2026-06-03 → 06-08 where only 5/48 ticks fired on Fri and zero fired
    # on Mon. Explicit lists land in a different scheduler bucket and have
    # been more reliable in practice. Editing the file also resets the
    # workflow's scheduling priority, which is the standard GH workaround
    # for a throttled cron.
    - cron: '0,15,30,45 8-19 * * 1-5'
  workflow_dispatch:

# If a previous run is still in progress when the next cron tick fires,
# skip rather than queue. Keeps the workflow log clean during incidents.
concurrency:
  group: acaphe-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-22.04
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - name: Skip when Upstash secrets are missing
        id: gate
        env:
          URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::warning::Upstash secrets not configured — add UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN as repo secrets to enable polling."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip == 'false'
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install Python dependencies
        if: steps.gate.outputs.skip == 'false'
        working-directory: backend
        run: pip install --quiet -r scraper/requirements.txt psycopg2-binary

      # Cache the chromium binary (~120 MB) across the ~50 runs/week. On a hit,
      # `playwright install` skips the download; --with-deps still ensures OS
      # libs (fast on the ubuntu-22.04 image where most are preinstalled).
      - name: Cache Playwright browser
        if: steps.gate.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright Chromium
        if: steps.gate.outputs.skip == 'false'
        run: playwright install chromium --with-deps

      - name: Poll once and push to Upstash
        if: steps.gate.outputs.skip == 'false'
        working-directory: backend
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
        run: python -m scraper.acaphe_poller --once
