name: Acaphe live quotes poll

# Polls acaphe.com via the --once mode of acaphe_poller.py and pushes the
# latest snapshot to Upstash Redis. Runs every 5 minutes — the closest GH
# Actions cron allows. Free for public repos.
#
# Replaces the long-running worker model (Render / laptop) with a cron-
# triggered single fetch, so live quotes stay fresh without paying for a
# 24/7 worker.
#
# Required repo secrets:
#   UPSTASH_REDIS_REST_URL
#   UPSTASH_REDIS_REST_TOKEN
# Optional repo secret (for VN physical-price persistence):
#   DATABASE_URL

on:
  # Cron disabled — re-enable once Upstash secrets are configured.
  # Keep workflow_dispatch so you can still trigger it manually for testing.
  # schedule:
  #   - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

# If a previous run is still in progress when the next cron tick fires,
# skip rather than queue. Keeps the workflow log clean during incidents.
concurrency:
  group: acaphe-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-22.04
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install --quiet -r scraper/requirements.txt psycopg2-binary

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Skip when Upstash secrets are missing
        id: gate
        env:
          URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::warning::Upstash secrets not configured — add UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN as repo secrets to enable polling."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Poll once and push to Upstash
        if: steps.gate.outputs.skip == 'false'
        working-directory: backend
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
        run: python -m scraper.acaphe_poller --once
