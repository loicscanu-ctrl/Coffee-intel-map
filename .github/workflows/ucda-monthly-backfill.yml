name: "0.8 – One-shot — UCDA Uganda monthly reports backfill"

# Discovers + downloads + parses UCDA's full monthly-report history (4
# listing pages → ~80 PDFs going back to ~2018) into
# frontend/public/data/uganda_monthly.json. UCDA's site Cloudflare-blocks
# GitHub Actions IPs with 403, so the scraper uses patchright stealth
# (same pattern as scraper-cecafe-daily.yml).
#
# Diagnostic mode (`diag` input default = true) also uploads raw extracted
# PDF text + parsed JSON per report as a workflow artifact, so we can
# inspect format drift and design additional `_parse_vN` functions
# without re-downloading.
#
# NOT scheduled — workflow_dispatch only. Idempotent; PDFs are cached
# locally per-run to allow `max` to short-circuit cheaply.

on:
  workflow_dispatch:
    inputs:
      diag:
        description: "Dump raw text + parsed JSON per PDF (artifact)"
        required: false
        default: true
        type: boolean
      max:
        description: "Cap PDFs processed (blank = all). Use small N to iterate parsers."
        required: false
        default: ""
        type: string

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # patchright provides Cloudflare-bypass; pdfplumber extracts PDF text.
        # patchright lives outside the pinned requirements (same pattern as
        # scraper-cecafe-daily.yml) because pip's resolver silently drops it
        # against playwright==1.44.0.
        run: |
          set -e
          pip install requests pdfplumber
          pip install patchright
          python -m patchright install chromium

      - name: Run UCDA scraper
        id: scrape
        working-directory: backend
        env:
          DIAG: ${{ inputs.diag }}
          MAX:  ${{ inputs.max }}
        run: |
          set +e
          ARGS="--write"
          [ "$DIAG" = "true" ] && ARGS="$ARGS --diag"
          [ -n "$MAX" ] && ARGS="$ARGS --max $MAX"
          PYTHONPATH=. python -m scraper.sources.ucda_monthly $ARGS
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ucda-diagnostics
          path: |
            backend/scraper/debug/ucda/
            backend/scraper/cache/ucda/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit updated JSON if changed
        if: steps.scrape.outputs.rc == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f frontend/public/data/uganda_monthly.json ]; then
            git add frontend/public/data/uganda_monthly.json
            git diff --cached --quiet \
              && echo "No JSON change." \
              || (git commit -m "data: UCDA monthly reports backfill $(date -u +%Y-%m-%d) [skip ci]" \
                  && git pull --rebase --autostash --strategy-option=theirs origin main \
                  && git push)
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
