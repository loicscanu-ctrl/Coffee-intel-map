name: "1.5 – Check Data Pipeline Freshness"

# Reads frontend/public/data/health.json and pings Telegram if anything is
# stale. Two checks in one workflow:
#
#   scrapers:  per-upstream-source timestamp — "when did the source last
#              write data into our DB". Catches a silently-failing scraper.
#
#   exporters: per-topic timestamp — "when did workflow 1.4 last publish
#              this topic's static JSON". Catches a silently-failing
#              exporter (scraper succeeded but the JSON write didn't),
#              which the scrapers-only check used to miss. Added 2026-06
#              after the export_static_json.py failure-isolation refactor
#              (PR #423 / #424) made per-topic failures non-fatal — that
#              gain in resilience needed an observability backstop here.

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily — ~4 h after export-and-publish typically lands (~02:55 UTC)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check data pipeline freshness
        id: check
        env:
          HEALTH_FILE: frontend/public/data/health.json
        run: |
          python - <<'PY'
          import json, os, sys
          from datetime import datetime, timezone

          # Per-scraper staleness threshold in hours. CFTC publishes COT
          # reports as-of Tuesday on Friday evening, so by Friday morning the
          # latest available data is legitimately ~10 days old by as-of date.
          # 11 days gives one publication cycle of slack before alerting.
          # The fertilizer sources are monthly (World Bank Pink Sheet on the
          # 2nd of each month, MDIC Comex around the 12th–15th); 45 days
          # gives one missed-cycle buffer.
          THRESHOLDS_H = {
              # Daily / near-daily sources (2-day buffer)
              "futures":              48,
              # Freight: scraped Fri + Sun only (1.2 cron `19 2 * * 5,0`). The
              # Freightos index publishes weekly with the data stamped at end-of-
              # week, so `FreightRate.date` lands on Fridays and stays there
              # through the Sun re-scrape. 9-day limit = one missed weekly
              # publish + 2-day buffer; a 2-day limit fires every Monday morning
              # by design even when the scraper is healthy.
              "freight":              9 * 24,
              "weather":              48,
              "enso":                 48,
              "vietnam_price":        48,  # giacaphe.com via vietnam.py — silent-failed Apr 23 → May 14 2026
              # CCI is produced by quant-currency-index Mon-Fri only (`30 21 * * 1-5`).
              # 96 h matches sibling fx_history's "4-day buffer over weekends"
              # threshold — both files come out of the same workflow run.
              "quant_currency_index": 96,
              "fx_history":           96,  # Macro tab FX time-series; weekday-only workflow, 4-day buffer over weekends
              "origin_prices":        48,  # Macro tab Origin Prices time-series (accumulator, runs in 1.4)
              # Monthly source — Retail CPI series publishes on the 10th–15th of each month
              "retail_cpi":           45 * 24,
              "us_cpi":               45 * 24,  # BLS CPI-U release, monthly (~mid-month)
              # Weekly/rolling sources
              "cot":              11 * 24,   # CFTC COT report (weekly, Fri PM)
              "macro_cot":        11 * 24,
              # Monthly sources (one missed cycle + buffer)
              "fertilizer_wb":    45 * 24,   # World Bank Pink Sheet (monthly)
              "fertilizer_comex": 45 * 24,   # MDIC Comex (monthly, mid-month)
              "brazil_exports":   45 * 24,   # Cecafe monthly green-coffee report
              "psd_coffee":       45 * 24,   # USDA PSD (monthly)
              # AJCA is UPLOAD-dated (health.py takes the newest /uploads/YYYY/MM/
              # path from ajca.json = when AJCA last published anything, floored
              # to the 1st). Healthy worst case ≈ 30d month-floor + ~31d between
              # monthly uploads + ≤7d weekly scrape ≈ 68d. 70d alerts within
              # ~2-4 weeks of a genuinely missed publish without crying wolf on
              # AJCA's 5-9 week period lag (which the old period-dated 45d did).
              "ajca":             70 * 24,   # Japan AJCA (monthly uploads)
              "conab_costs":      45 * 24,   # CONAB costs (monthly)
              "conab_safra":      45 * 24,   # CONAB safra (monthly)
              "ecf":              90 * 24,   # ECF port stocks (bi-monthly)
              # Daily business-day source — allow up to 10 days for gaps/holidays
              "cecafe_daily":     10 * 24,
              # ICE certified stocks. Daily stock runs Mon-Fri (data is T-1), so
              # 6 days buffers weekends + a holiday. The two monthly reports are
              # captured by workflow 1.14's 1st-3rd catch window; their month_end
              # tops out ~33 days old just before the next capture, so 38 days
              # alerts within a few days of a missed window (the agreed red-alert
              # that hands the monthly report back to a human).
              "ice_certified_daily":       6 * 24,
              "ice_arabica_ageing":        38 * 24,
              "ice_robusta_age_allowance": 38 * 24,
          }
          DEFAULT_H = 48

          # Per-EXPORTER threshold (for health.json["exporters"], the per-topic
          # publish-success map written by workflow 1.4's orchestrator). Workflow
          # 1.4 runs daily at 02:41 UTC AND fans out from every upstream scraper's
          # workflow_run completion, so every exporter is touched at least once
          # per ~24 h. A 48 h threshold gives one missed daily cycle + a buffer
          # before alerting — wider than that and a one-day flake hides indefinitely.
          EXPORTER_DEFAULT_H = 48
          EXPORTER_THRESHOLDS_H: dict[str, int] = {
              # No per-topic overrides yet. Keep the table here so future
              # topic-specific buffers (e.g. an exporter that legitimately
              # publishes weekly only) land in one obvious place.
          }

          def _parse_ts(ts):
              """Accept YYYY-MM-DD or full ISO; return tz-aware datetime or raise."""
              if len(ts) == 10:
                  return datetime.strptime(ts, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              dt = datetime.fromisoformat(ts.replace("Z", "+00:00"))
              return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)

          def _check(name, ts, limit_h, label_prefix=""):
              """Returns a stale-message string or None. `label_prefix` is the
              kind tag shown in the alert ("" for scrapers, "exporter:" for
              exporters) so the operator sees which layer failed."""
              full = f"{label_prefix}{name}"
              if not ts:
                  return f"{full}: never run"
              try:
                  dt = _parse_ts(ts)
              except Exception as e:
                  return f"{full}: unparseable timestamp '{ts}' ({e})"
              age_h = (now - dt).total_seconds() / 3600
              if age_h > limit_h:
                  return f"{full}: {age_h/24:.1f}d old (limit {limit_h/24:.1f}d, last={ts})"
              return None

          path = os.environ["HEALTH_FILE"]
          with open(path) as f:
              health = json.load(f)
          scrapers  = health.get("scrapers",  {})
          exporters = health.get("exporters", {})  # added in PR #423; absent on pre-rollout health.json

          now = datetime.now(timezone.utc)
          stale = []

          # 1. Per-scraper (upstream source freshness).
          for name, ts in scrapers.items():
              msg = _check(name, ts, THRESHOLDS_H.get(name, DEFAULT_H))
              if msg: stale.append(msg)

          # 2. Per-exporter (publish-layer freshness). Catches a scraper that
          # worked but whose export_<topic>(db) raised, which the scrapers-only
          # check used to miss entirely.
          for name, ts in exporters.items():
              msg = _check(name, ts, EXPORTER_THRESHOLDS_H.get(name, EXPORTER_DEFAULT_H),
                           label_prefix="exporter:")
              if msg: stale.append(msg)

          if stale:
              msg = "Stale entries in health.json:\n" + "\n".join(f"• {s}" for s in stale)
              print(msg)
              with open(os.environ["GITHUB_OUTPUT"], "a") as g:
                  g.write("stale<<EOF\n" + msg + "\nEOF\n")
              sys.exit(1)
          print(f"All fresh: {len(scrapers)} scrapers, {len(exporters)} exporters.")
          PY

      - name: Notify Telegram on stale data
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STALE:              ${{ steps.check.outputs.stale }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured — skipping notification"
            exit 0
          fi
          body="${STALE:-Freshness check failed (no detail captured)}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          text=$(printf '🚨 Data pipeline stale — see %s\n\n%s' "$run_url" "$body")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${text}" \
            >/dev/null || true
