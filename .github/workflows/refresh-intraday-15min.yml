name: "1.98 – Refresh Intraday KC/RC 15min (daily)"

# Daily incremental refresh of the 15-min intraday points (RM + KC) so the
# open-direction model's two intraday features (kc_after_rc_diff,
# rc_overnight_gap) stay current and the model's scored `as_of` doesn't freeze.
#
# Unlike the deep backfill (1.97, ~5.7y from 59 contracts, manual), this fetches
# only the few NEAREST contracts, volume-stitches them with the SAME logic as
# the backfill, extracts the recent days and MERGES them into the existing file
# (recent dates overwrite, older history preserved). See
# backend/scraper/refresh_intraday_kc_rc.py.
#
# Scheduled at 20:13 UTC Mon-Fri: after both markets close (KC 18:30 London =
# 17:30 UTC summer / 18:30 UTC winter) and before the 21:30 UTC quant run (1.9),
# so the model picks up the fresh intraday the same day. Same-day official
# settles aren't in the archive yet at this hour — that's fine, the model
# doesn't use the settle; the next day's refresh fills it in.

on:
  schedule:
    - cron: "13 20 * * 1-5"
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps + chromium
        run: |
          pip install --quiet playwright
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          playwright install chromium --with-deps || playwright install chromium
      - name: Refresh 15-min intraday (incremental)
        working-directory: backend
        run: python -m scraper.refresh_intraday_kc_rc
      - name: Commit intraday refresh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/intraday_kc_rc_15min.json
          git diff --cached --quiet \
            && echo "No change." \
            || (git commit -m "data: refresh intraday KC/RC 15min [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
