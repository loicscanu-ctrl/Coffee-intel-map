name: "_probe – FX history date range (throwaway)"

# Throwaway diagnostic: finds how far back fawazahmed0 currency-api serves data
# and via which URL form, from a runner where jsDelivr is reachable. Removed once
# the multi-year CCI backfill is built around the result.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet requests
      - name: Probe FX history
        working-directory: backend
        run: python -m scraper.quant_model._probe_fx_history
