name: "0.7 – One-shot — Backfill Surface Soil Moisture history (ERA5 archive)"

# The daily fetcher (1.10) writes ESSM going forward only — its forecast
# endpoint doesn't reach back far enough. The Surface Soil Moisture chart's
# "calendar year" view stays empty for a year on every newly tracked field
# unless we one-shot fill from the ERA5 archive (1940→present, hourly soil
# moisture).
#
# NOT scheduled — workflow_dispatch only. Idempotent: only fills dates
# where `essm` is None / missing; never overwrites a stored value.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all"
        required: false
        default: ""
        type: string
      days:
        description: "Lookback window in days (default 400 ≈ 13 months)"
        required: false
        default: "400"
        type: string
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill-essm:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill ESSM — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
          DAYS:    ${{ inputs.days }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS="--days $DAYS"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/backfill_essm_history.py $ARGS

      - name: Overlay main's current history (so concurrent commits don't conflict)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          mkdir -p backend/seed/weather_history
          for f in $(git ls-tree -r origin/main --name-only | grep '^backend/seed/weather_history/.*\.json$'); do
            git show "origin/main:$f" > "$f" 2>/dev/null || true
          done

      - name: Backfill ESSM — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
          DAYS:    ${{ inputs.days }}
        run: |
          echo "=== APPLY — writing backend/seed/weather_history/*.json ==="
          ARGS="--write --days $DAYS"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/backfill_essm_history.py $ARGS

      - name: Commit refreshed history to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/wh"
          cp backend/seed/weather_history/*.json "$RUNNER_TEMP/wh/"
          git checkout -- backend/seed/weather_history/ 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/wh"/*.json backend/seed/weather_history/
          git add backend/seed/weather_history/*.json
          if git diff --cached --quiet; then
            echo "No change — ESSM already populated across the requested window."
            exit 0
          fi
          git commit -m "data: backfill Surface Soil Moisture history (ERA5 archive) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit."
          else
            echo "ESSM backfill committed. Dispatch 1.10 (daily weather) to publish the long essm_recent series to frontend/public/data/*_weather.json."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
