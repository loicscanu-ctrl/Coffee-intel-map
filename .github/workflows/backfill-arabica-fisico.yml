name: "Z – Backfill: Brazil Arabica físico"

# One-shot: walk the noticiasagricolas físico date-URLs to build
# brazil_arabica_fisico.json (all município quotes + trimmed mean), seed the
# brazil_arabica origin history from it, and commit both to this branch.

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Backfill start date (YYYY-MM-DD)"
        required: false
        default: "2023-06-01"

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install beautifulsoup4
      - name: Backfill físico history
        working-directory: backend
        run: python -m scraper.sources.brazil_arabica_fisico backfill "${{ inputs.start }}"
      - name: Seed origin history from físico
        working-directory: backend
        run: python -m scraper.sources.brazil_arabica_fisico seed-origin
      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/brazil_arabica_fisico.json frontend/public/data/origin_prices_history.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: backfill Brazil Arabica físico history + seed origin [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin "${{ github.ref_name }}" && git push && exit 0
              sleep $((RANDOM % 5 + 3))
            done
            echo "::error::push failed"; exit 1
          fi
