name: "9.6 – Backfill KC Sept/Dec contract settles + event study (one-off)"

# One-off for the September X-ray event study: fetches per-contract daily
# settles for KC July/Sept/Dec 2006→current from Barchart (expired contracts
# included), then re-runs the cot_sept_study exporter so the study block in
# sept_positioning.json gains the real Jul→Sep / Sep→Dec spread outcomes.
# Append-once per year on the contract file — safe to re-run.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true; playwright install chromium --with-deps || playwright install chromium

      - name: Fetch KC N/U/Z per-contract settles (Barchart)
        working-directory: backend
        run: python -m scraper.backfill_sept_spreads

      - name: Re-run September X-ray exporter (study block picks up spreads)
        working-directory: backend
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scraper.exporters.cot_sept_study import export_cot_sept_study
          export_cot_sept_study()
          "

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in data/kc_sept_dec_contracts.json frontend/public/data/sept_positioning.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: KC Sept/Dec contract settles + September X-ray event study [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
