name: "0.9 – One-shot — Backfill 30Y daily weather history (1995-2024)"

# Why: build_origin_weather.py fetched 30Y of daily archive data (1991-2020)
# to compute the monthly normals, but it only persisted the aggregated
# 12-element arrays (monthly_avg_temp/rain etc.) and threw away the per-day
# source. The SPI/SPEI baselines (1995-2024) kept monthly totals, but only
# for precipitation + ET₀ — no temperature.
#
# Result: charts can show 30Y *averages*, but the "last year" / "prior crop
# year" lines have no source for any year before 2025-01-01 (where the live
# weather_history starts). Brazil's 2024/25 crop-year line on the temperature
# chart is therefore blank for Jun-Dec 2024.
#
# This one-shot re-pulls daily rain + tmean + ET₀ from the Open-Meteo ERA5
# archive for 1995-01-01 .. 2024-12-31 per region and injects the rows into
# weather_history/. After it lands, the LY temperature/rain line populates
# for every origin (calendar + crop-year) all the way back to 1995.
#
# Volume: 30Y × ~365d × 32 provinces ≈ 350,000 daily rows on disk (~40MB
# total across the seven origin files). Open-Meteo allows 10k requests/day;
# the script does one request per province per call → 32 requests for the
# whole backfill (well under any limit).
#
# Idempotent: only writes dates that don't already exist. Safe to re-dispatch
# on a partial failure — re-runs skip what's already there.
#
# NOT scheduled — workflow_dispatch only.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys (blank = all 7: brazil colombia honduras indonesia uganda ethiopia vn)"
        required: false
        default: ""
        type: string
      start:
        description: "Start date YYYY-MM-DD (default 1995-01-01 matches SPI baseline)"
        required: false
        default: "1995-01-01"
        type: string
      end:
        description: "End date YYYY-MM-DD (default 2024-12-31 = seam with live history)"
        required: false
        default: "2024-12-31"
        type: string
      regions:
        description: "Region names to retry, COMMA-separated (blank = all in the selected origins). Use after a partial-failure run, e.g. 'Java,Mt Elgon,Sidama/Yirgacheffe,Jimma,Limu,Kaffa,Harrar,Dak Lak,Lam Dong,Dak Nong'."
        required: false
        default: ""
        type: string
      throttle_s:
        description: "Seconds to sleep between region requests (default 3.0 — bump higher after a 429 to clear Open-Meteo's hourly archive rate limit)"
        required: false
        default: "3"
        type: string
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill-30yr:
    runs-on: ubuntu-22.04
    # 30Y per region × 32 regions × 1s throttle ≈ 1 min wall clock for the
    # API calls themselves, plus per-region JSON serialisation. 60 min ceiling
    # leaves room for a slow ERA5 response on the first request of a large
    # window (the archive sometimes warms cold storage).
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill 30Y history — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS:  ${{ inputs.origins }}
          REGIONS:  ${{ inputs.regions }}
          START:    ${{ inputs.start }}
          END:      ${{ inputs.end }}
          THROTTLE: ${{ inputs.throttle_s }}
          PYTHONUNBUFFERED: "1"
        # Region names can contain spaces ("Sul de Minas"), so the input is
        # comma-separated and IFS-split here into properly quoted argv tokens.
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          set -- --start "$START" --end "$END" --throttle-s "$THROTTLE"
          if [ -n "$ORIGINS" ]; then
            # Origins keys never contain spaces, so plain word-split is fine.
            set -- "$@" --origins $ORIGINS
          fi
          if [ -n "$REGIONS" ]; then
            old_ifs="$IFS"; IFS=','
            set -- "$@" --regions $REGIONS
            IFS="$old_ifs"
          fi
          python backend/scripts/backfill_history_gap.py "$@"

      - name: Overlay main's current history (concurrent commits won't conflict)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          mkdir -p backend/seed/weather_history
          for f in $(git ls-tree -r origin/main --name-only | grep '^backend/seed/weather_history/.*\.json$'); do
            git show "origin/main:$f" > "$f" 2>/dev/null || true
          done

      - name: Backfill 30Y history — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS:  ${{ inputs.origins }}
          REGIONS:  ${{ inputs.regions }}
          START:    ${{ inputs.start }}
          END:      ${{ inputs.end }}
          THROTTLE: ${{ inputs.throttle_s }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== APPLY — writing backend/seed/weather_history/*.json ==="
          set -- --write --start "$START" --end "$END" --throttle-s "$THROTTLE"
          if [ -n "$ORIGINS" ]; then
            set -- "$@" --origins $ORIGINS
          fi
          if [ -n "$REGIONS" ]; then
            old_ifs="$IFS"; IFS=','
            set -- "$@" --regions $REGIONS
            IFS="$old_ifs"
          fi
          python backend/scripts/backfill_history_gap.py "$@"

      - name: Commit refreshed history to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Snapshot the freshly-written history before re-syncing main —
          # then re-apply the snapshot so other concurrent pushes don't
          # clobber the backfill.
          mkdir -p "$RUNNER_TEMP/wh"
          cp backend/seed/weather_history/*.json "$RUNNER_TEMP/wh/"
          git checkout -- backend/seed/weather_history/ 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/wh"/*.json backend/seed/weather_history/
          git add backend/seed/weather_history/*.json
          if git diff --cached --quiet; then
            echo "No change to weather history — backfill window already filled."
            exit 0
          fi
          # The diff can be very large (40MB+ split across 7 files) — commit
          # message keeps the audit trail short and machine-readable.
          git commit -m "data: backfill 30Y daily weather history (${{ inputs.start }}..${{ inputs.end }}) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit."
          else
            echo "30Y backfill committed. Next 1.10 (daily weather) run will surface real per-year"
            echo "monthly_last_year_temp / monthly_last_year_rain for every prior calendar/crop year."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
