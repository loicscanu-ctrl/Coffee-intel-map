name: "Z – Probe: ANACAFE Guatemala prices (test)"

# Manual test harness for the Guatemala/ANACAFE scraper, kept OUT of the daily
# pipeline until the live fetch is proven here. Pure diagnostic — no DB, no
# commits. Confirms the GitHub runner can reach ANACAFE, and that the scraper
# (Playwright render + Precios formula fallback) returns the grade prices.
# Raw endpoint bodies are uploaded as the `anacafe-probe` artifact for offline
# inspection. Job goes red if no prices are returned.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright beautifulsoup4

      - name: Install Playwright browser
        run: sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true; playwright install chromium --with-deps || playwright install chromium

      - name: Probe ANACAFE
        run: python backend/scraper/probe_anacafe.py

      - name: Upload fetched bodies (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anacafe-probe
          path: debug/anacafe_probe/
          if-no-files-found: warn
          retention-days: 14
