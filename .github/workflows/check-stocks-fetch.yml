name: "Z – Stocks Fetch Smoke Test (diagnostic)"

# Diagnostic workflow that runs the USDA PSD scraper end-to-end from
# a GitHub Actions runner and commits the result + cache contents back
# to the branch under _diagnostic/ so the result is readable without
# the workflow-logs API.
#
# Triggered on push to any non-main branch (so we don't run it on main),
# plus manual workflow_dispatch.

on:
  # Manual only — this is a debugging tool, not part of the normal pipeline.
  # Run via Actions → "Z – Stocks Fetch Smoke Test (diagnostic)" → Run workflow.
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pandas openpyxl xlrd requests pypdf

      - name: Stage 1 — bare requests probe (test_stocks_fetch.py)
        id: probe
        continue-on-error: true
        working-directory: backend
        run: |
          set +e
          python -m scraper.test_stocks_fetch | tee /tmp/probe.txt
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Stage 2 — real PSD scraper (EU + Japan)
        id: psd
        continue-on-error: true
        working-directory: backend
        run: |
          set +e
          python -m scraper.sources.psd_coffee 2>&1 | tee /tmp/psd_run.txt
          echo "psd_exit=$?" >> "$GITHUB_OUTPUT"
          if [ -f scraper/cache/psd_coffee.json ]; then
            echo "PSD_CACHE_OK=yes" >> "$GITHUB_ENV"
          else
            echo "PSD_CACHE_OK=no" >> "$GITHUB_ENV"
          fi

      - name: Assemble diagnostic report
        if: always()
        run: |
          mkdir -p _diagnostic
          {
            echo "# Stocks-fetch diagnostic"
            echo ""
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- run:    https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- date:   $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "## Verdict"
            echo "- PSD scraper cache written : ${PSD_CACHE_OK:-no}"
            echo ""
            echo "## Stage 1 — bare requests probe"
            echo '```'
            sed 's/\x1b\[[0-9;]*m//g' /tmp/probe.txt 2>/dev/null || echo "(no probe output)"
            echo '```'
            echo ""
            echo "## Stage 2 — real PSD scraper run"
            echo '```'
            cat /tmp/psd_run.txt 2>/dev/null || echo "(no PSD output)"
            echo '```'
          } > _diagnostic/stocks-fetch-result.md

          if [ -f backend/scraper/cache/psd_coffee.json ]; then
            cp backend/scraper/cache/psd_coffee.json _diagnostic/psd_coffee.json
          fi
          # Clean any stale artifacts from earlier iterations
          rm -f _diagnostic/ice_certified.json _diagnostic/psd_japan.json 2>/dev/null

      - name: Commit diagnostic report back to branch
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --soft "origin/${GITHUB_REF_NAME}" || true
          git add _diagnostic/
          if git diff --cached --quiet; then
            echo "No diagnostic changes to commit"
            exit 0
          fi
          git commit -m "ci(diagnostic): stocks-fetch result for ${GITHUB_SHA::7}"
          for i in 1 2 3; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            sleep $((i * 3))
          done
          echo "::warning::failed to push diagnostic report after 3 attempts"
