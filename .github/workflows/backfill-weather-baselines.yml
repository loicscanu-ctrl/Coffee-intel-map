name: "0.2 – One-shot — Build weather baselines (Open-Meteo climatology)"

# Manually-triggered, one-time build of the seasonal weather baselines that the
# morning brief's "MTD rain vs historical hi/lo for this date" section needs.
#
# WHY a workflow: the build fetches 1995–2020 daily precip/temp from
# archive-api.open-meteo.com. That host is NOT on the Claude Code web sandbox's
# egress allowlist (returns 403 "Host not in allowlist"), so the backfill can't
# run from there. GitHub's runners have open egress, so we build here instead.
#
# The baseline is STATIC climatology — build once, commit, done. The brief then
# reads backend/seed/weather_baselines.json with no network at runtime.
#
# Runs the build_weather_baselines.py from the DISPATCHED ref (so the extended
# per-day MTD-envelope version is used), then commits ONLY the seed file to main.
# Dispatch from this feature branch before merge, or from main after merge —
# either way the seed lands on main.
#
# NOT scheduled — workflow_dispatch only. Safe to re-run; it overwrites the seed.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: "Space-separated region keys, or blank for all (colombia honduras ethiopia uganda indonesia brazil vietnam)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry-run only (preview, no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  build-baselines:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build baselines — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          REGIONS: ${{ inputs.regions }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS=""
          [ -n "$REGIONS" ] && ARGS="--regions $REGIONS"
          python backend/scripts/build_weather_baselines.py $ARGS

      - name: Overlay main's current seed (so merge preserves already-built regions)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          # If main already has a seed, start the merge from it; the build then
          # adds/refreshes regions on top instead of replacing the whole file.
          git show origin/main:backend/seed/weather_baselines.json > backend/seed/weather_baselines.json 2>/dev/null || true

      - name: Build baselines — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          REGIONS: ${{ inputs.regions }}
        run: |
          echo "=== APPLY — writing backend/seed/weather_baselines.json ==="
          ARGS="--write"
          [ -n "$REGIONS" ] && ARGS="$ARGS --regions $REGIONS"
          python backend/scripts/build_weather_baselines.py $ARGS

      - name: Commit seed to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # The seed was just built from the dispatched ref's (extended) script.
          # Preserve it, then switch to main so the commit lands there regardless
          # of which branch this workflow was dispatched from.
          cp backend/seed/weather_baselines.json "$RUNNER_TEMP/weather_baselines.json"
          # --write dirtied the tracked seed in the working tree; revert it so the
          # branch switch is clean (the built copy is safe in RUNNER_TEMP).
          git checkout -- backend/seed/weather_baselines.json
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/weather_baselines.json" backend/seed/weather_baselines.json

          git add backend/seed/weather_baselines.json
          if git diff --cached --quiet; then
            echo "No change to weather_baselines.json — seed already current."
            exit 0
          fi

          git commit -m "data: build weather baselines (Open-Meteo climatology) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Review the preview above; re-run with dry_run=false to commit."
          else
            echo "Baselines built and committed to main. The morning brief's Supply & Weather block will switch from the drought-alert fallback to the MTD-rain-vs-envelope view on its next run."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
