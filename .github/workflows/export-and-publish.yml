name: "1.4 – Export and Publish Static JSON"

on:
  schedule:
    # 02:41 UTC daily — AFTER the Daily OI Snapshot (1.3, 02:13) commits the
    # per-contract archive, so the export consumes today's archive (not
    # yesterday's). Previously 02:30, which ran before 1.3 → OI-derived
    # visuals lagged a day. 41 (not 30) to dodge GH cron skip on :30 marks.
    - cron: '41 2 * * *'
  workflow_dispatch:        # allow manual trigger from GitHub UI
  workflow_run:
    # Also run right after the upstream scrapers finish, so a same-day data
    # update is published without waiting for the next cron. 1.3 (Daily OI)
    # is included so the archive-derived visuals refresh in the same cycle.
    workflows: ["1.1 – Daily News Scraper", "2.3 – COT Scraper", "1.3 – Daily OI Snapshot"]
    types: [completed]

# Serialize overlapping runs onto a single queue. Without this, two
# back-to-back triggers (e.g. 1.1 and 2.3 both finishing within a few
# minutes, or a manual dispatch landing during a scheduled run) each
# regenerate the JSON files and race to `git push origin main`. The
# loser then fails its `git pull --rebase` with merge conflicts on
# every changed JSON file. queueing them serially means the later run
# starts from an up-to-date main and re-exports cleanly.
concurrency:
  group: export-and-publish
  cancel-in-progress: false

jobs:
  export:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Map each trigger to the slice of topics it actually affects, so a single
      # upstream scraper doesn't force a full 22-topic re-export. cron / manual
      # dispatch / an unrecognised upstream all fall back to a full export.
      # `signals` (which needs `npm ci`) only runs when cot.json can change.
      - name: Decide export scope
        id: scope
        env:
          EVENT: ${{ github.event_name }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
        run: |
          topics=""; signals=false
          if [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            signals=true                       # full export + signals
          else
            case "$RUN_NAME" in
              *"COT Scraper"*)        topics="cot,macro_cot,oi_fnd_chart"; signals=true ;;
              *"Daily OI Snapshot"*)  topics="futures_chain,oi_fnd_chart,latest_prices" ;;
              *"Daily News Scraper"*) topics="news,latest_prices,vn_physical_prices,retail_cpi,us_cpi" ;;
              *)                      signals=true ;;   # unknown upstream → full, safe
            esac
          fi
          {
            echo "topics=$topics"
            echo "signals=$signals"
          } >> "$GITHUB_OUTPUT"
          echo "scope: event=$EVENT name='$RUN_NAME' → topics='${topics:-ALL}' signals=$signals"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - uses: actions/setup-node@v4
        if: steps.scope.outputs.signals == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Install frontend dev dependencies (for signal export)
        if: steps.scope.outputs.signals == 'true'
        working-directory: frontend
        run: npm ci

      - name: Export static JSON files
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ONLY: ${{ steps.scope.outputs.topics }}
        run: |
          if [ -n "$ONLY" ]; then
            python -m scraper.export_static_json --only "$ONLY"
          else
            python -m scraper.export_static_json
          fi

      - name: Export rule-based COT signals (signals.json)
        if: steps.scope.outputs.signals == 'true'
        working-directory: frontend
        run: npm run export:signals

      - name: Commit updated static JSON if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # NOTE: oi_history.json is intentionally NOT staged here — it is
          # owned and committed by the Daily OI Snapshot workflow (1.3).
          git add \
                  frontend/public/data/futures_chain.json \
                  frontend/public/data/oi_fnd_chart.json \
                  frontend/public/data/cot.json \
                  frontend/public/data/cot_recent.json \
                  frontend/public/data/macro_cot.json \
                  frontend/public/data/freight.json \
                  frontend/public/data/farmer_economics.json \
                  frontend/public/data/farmer_selling_brazil.json \
                  frontend/public/data/health.json \
                  frontend/public/data/latest_prices.json \
                  frontend/public/data/vietnam_supply.json \
                  frontend/public/data/signals.json
          for f in frontend/public/data/vietnam_last.json frontend/public/data/vn_physical_prices.json frontend/public/data/colombia_supply.json frontend/public/data/honduras_supply.json frontend/public/data/indonesia_supply.json frontend/public/data/uganda_supply.json frontend/public/data/ethiopia_supply.json frontend/public/data/demand_stocks.json frontend/public/data/retail_cpi.json frontend/public/data/us_cpi.json frontend/public/data/origin_prices_history.json frontend/public/data/news.json frontend/public/data/countries.json frontend/public/data/factories.json; do
            [ -f "$f" ] && git add "$f" || true
          done

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "data: update static JSON [skip ci]"

          # Rebase strategy — scraper-produced JSON is canonical:
          #
          # The export job runs concurrently with several other workflows
          # that also commit to main (1.3 daily OI snapshot, 2.3 COT scraper,
          # 1.9 quant currency index, etc.). The `concurrency.group` block
          # above queues *this* workflow's runs serially, but it does NOT
          # gate against unrelated workflows pushing between the time we
          # `checkout@v4` and reach the push below — and those other
          # workflows write to the same `frontend/public/data/` files.
          #
          # On conflict, our locally-regenerated JSON is always the right
          # answer: export_static_json.py reads from the DB and produces
          # the exact published shape, so taking our version doesn't lose
          # data — the other workflow's JSON contents were either already
          # in the DB (so our export contains them) or are from a different
          # file we didn't touch (so no conflict).
          #
          # `--strategy-option=theirs` during a rebase keeps the side being
          # replayed (our commit), discarding the rebase-target side (main).
          # Files we didn't `git add` flow through from main unchanged.
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      # Phase-3 sunset gate: export_static_json writes a `warnings` entry into
      # health.json when latest_prices/vn_physical_prices had to fall back to
      # NewsItem regex parsing (PhysicalPrice was empty). This runs AFTER the
      # commit on purpose — the fallback output is valid and still publishes —
      # but fails the run (and fires the Telegram notifier) so a fallback never
      # passes silently. A clean green history here is the evidence needed to
      # delete the regex fallback entirely.
      - name: Gate — assert no price regex fallback
        run: |
          HEALTH=frontend/public/data/health.json
          if [ -f "$HEALTH" ] && grep -q "latest_prices_used_regex_fallback" "$HEALTH"; then
            echo "::error::Price export fell back to NewsItem regex (PhysicalPrice empty). Check the price scrapers (vietnam/brazil/uganda/b3_icf/barchart) before sunsetting the regex."
            exit 1
          fi
          echo "OK — structured PhysicalPrice path used (no regex fallback)."

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
