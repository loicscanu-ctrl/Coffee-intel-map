name: Export and Publish Static JSON

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily — 3 h after scraper-daily (01:00 UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI
  workflow_run:
    workflows: ["Daily News Scraper"]
    types: [completed]      # re-export whenever the scraper finishes (manual or scheduled)

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Export static JSON files
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Commit updated static JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
                  frontend/public/data/futures_chain.json \
                  frontend/public/data/oi_fnd_chart.json \
                  frontend/public/data/cot.json \
                  frontend/public/data/cot_recent.json \
                  frontend/public/data/macro_cot.json \
                  frontend/public/data/freight.json \
                  frontend/public/data/farmer_economics.json \
                  frontend/public/data/health.json
          for f in frontend/public/data/vietnam_last.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: update static JSON [skip ci]" && git pull --rebase --autostash origin main && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
