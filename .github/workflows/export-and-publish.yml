name: "1.4 – Export and Publish Static JSON"

on:
  schedule:
    - cron: '30 1 * * *'   # 01:30 UTC daily — 30 min after scraper-daily (01:00 UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI
  workflow_run:
    workflows: ["1.1 – Daily News Scraper", "2.3 – COT Scraper"]
    types: [completed]

# Serialize overlapping runs onto a single queue. Without this, two
# back-to-back triggers (e.g. 1.1 and 2.3 both finishing within a few
# minutes, or a manual dispatch landing during a scheduled run) each
# regenerate the JSON files and race to `git push origin main`. The
# loser then fails its `git pull --rebase` with merge conflicts on
# every changed JSON file. queueing them serially means the later run
# starts from an up-to-date main and re-exports cleanly.
concurrency:
  group: export-and-publish
  cancel-in-progress: false

jobs:
  export:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Export static JSON files
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Commit updated static JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
                  frontend/public/data/futures_chain.json \
                  frontend/public/data/oi_fnd_chart.json \
                  frontend/public/data/oi_history.json \
                  frontend/public/data/cot.json \
                  frontend/public/data/cot_recent.json \
                  frontend/public/data/macro_cot.json \
                  frontend/public/data/freight.json \
                  frontend/public/data/farmer_economics.json \
                  frontend/public/data/farmer_selling_brazil.json \
                  frontend/public/data/health.json \
                  frontend/public/data/latest_prices.json \
                  frontend/public/data/vietnam_supply.json
          for f in frontend/public/data/vietnam_last.json frontend/public/data/vn_physical_prices.json frontend/public/data/colombia_supply.json frontend/public/data/honduras_supply.json frontend/public/data/indonesia_supply.json frontend/public/data/uganda_supply.json frontend/public/data/ethiopia_supply.json frontend/public/data/demand_stocks.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: update static JSON [skip ci]" && git pull --rebase --autostash origin main && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
