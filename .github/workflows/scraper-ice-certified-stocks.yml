name: "1.13 – ICE Certified Stocks (arabica + robusta)"

# Pulls ICE certified-stocks reports (10 sources) and writes the two static
# JSONs the frontend consumes:
#   frontend/public/data/certified_stocks_arabica.json
#   frontend/public/data/certified_stocks_robusta.json
#
# The `days_back` input lets a test run (e.g. 30) precede the full historical
# backfill. Per-source failures are logged but don't block the run.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke = hit 10 probe-verified URLs once (no commit); backfill = real window"
        required: false
        default: "backfill"
        type: choice
        options:
          - smoke
          - backfill
      days_back:
        description: "Backfill window in business days (ignored if mode=smoke)"
        required: false
        default: "30"
        type: string
  # Schedule once the test pass looks healthy. Holding off until then.
  # schedule:
  #   - cron: '0 11 * * *'   # 11:00 UTC — after ICE's morning publishes

concurrency:
  group: data-commit          # same group as the other data pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests 'xlrd<2.0' openpyxl pdfplumber

      - name: Pull ICE certified stocks
        working-directory: backend
        run: |
          if [ "${{ inputs.mode }}" = "smoke" ]; then
            python -m scraper.sources.ice_certified_stocks.orchestrate --smoke
          else
            python -m scraper.sources.ice_certified_stocks.orchestrate \
              --days ${{ inputs.days_back || 30 }}
          fi

      - name: Commit + push if changed
        if: ${{ inputs.mode != 'smoke' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/certified_stocks_arabica.json \
                  frontend/public/data/certified_stocks_robusta.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: ICE certified stocks (${{ inputs.days_back || 30 }}d) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
