name: "1.13 – ICE Certified Stocks (arabica + robusta)"

# Pulls ICE certified-stocks reports (10 sources) and writes the two static
# JSONs the frontend consumes:
#   frontend/public/data/certified_stocks_arabica.json
#   frontend/public/data/certified_stocks_robusta.json
#
# The `days_back` input lets a test run (e.g. 30) precede the full historical
# backfill. Per-source failures are logged but don't block the run.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke = hit 10 probe-verified URLs once (no commit); backfill = real window"
        required: false
        default: "backfill"
        type: choice
        options:
          - smoke
          - backfill
      days_back:
        description: "Backfill window in business days (e.g. 3 for daily catch-up, 180 for full history)"
        required: false
        default: "3"
        type: string
  schedule:
    # 17:00 UTC daily — past ICE's morning robusta publish (~10:30 UTC) and
    # afternoon arabica publish (~13:30 UTC). Small window (days_back=3) is
    # enough to catch any missed day; the merge step preserves the full history
    # on disk from prior backfill runs.
    - cron: '0 17 * * *'

concurrency:
  group: data-commit          # same group as the other data pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Big enough for a one-off 180-day backfill at 5s/req on /marketdata/ (~90
    # min worst case). Daily cron runs in ~5-10 min on a 3-day window.
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # sqlalchemy / psycopg2-binary / python-dotenv / jinja2 are needed for
        # the orchestrator's tail step that emits a news_feed commentary row
        # (see scraper/sources/ice_certified_stocks/news_emit.py). The upsert
        # is a no-op when DATABASE_URL is unset, but importing scraper.db
        # still loads sqlalchemy at module-import time.
        run: pip install requests 'xlrd<2.0' openpyxl pdfplumber sqlalchemy psycopg2-binary python-dotenv jinja2

      - name: Pull ICE certified stocks
        working-directory: backend
        env:
          # Force unbuffered stdout so every print() shows up immediately in
          # the Actions log instead of waiting for the (block-buffered) pipe
          # to fill — otherwise a long run looks "stalled" until completion.
          PYTHONUNBUFFERED: "1"
          # Optional — when set, the orchestrator's tail step upserts a
          # news_feed row carrying a `_commentary` block for each market.
          # The next run of workflow 1.4 (Export and Publish) lifts that
          # block to a top-level `commentary` field in news.json. Unset →
          # no-op (snapshots still publish).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Scheduled cron passes no inputs → default to a 3-day catch-up
          # (merge preserves the history). Manual dispatch can override with
          # days_back=180 for the one-off historical backfill.
          if [ "${{ inputs.mode }}" = "smoke" ]; then
            python -m scraper.sources.ice_certified_stocks.orchestrate --smoke
          else
            python -m scraper.sources.ice_certified_stocks.orchestrate \
              --days "${{ inputs.days_back || 3 }}"
          fi

      - name: Commit + push if changed
        if: ${{ inputs.mode != 'smoke' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/certified_stocks_arabica.json \
                  frontend/public/data/certified_stocks_robusta.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: ICE certified stocks (${{ inputs.days_back || 30 }}d) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
