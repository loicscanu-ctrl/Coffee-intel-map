name: "Z – Probe: Honduras coffee price source (test)"

# Diagnostic: render preciocafehonduras.com, capture its admin-ajax.php response
# + the full rendered text, so we can see whether it carries a real Honduras
# differential/farmgate price or just the NY 'C' in Lempiras. No DB, no commits.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright beautifulsoup4

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Probe Honduras
        run: python backend/scraper/probe_honduras.py

      - name: Upload fetched bodies (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: honduras-probe
          path: debug/honduras_probe/
          if-no-files-found: warn
          retention-days: 14
