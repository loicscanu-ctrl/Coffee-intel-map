name: "0.9 – BPS Indonesia coffee exports (monthly)"

# Pulls Indonesia's national coffee export numbers from BPS. The page sits
# behind Cloudflare Turnstile, which rejects every datacenter IP on
# fingerprint regardless of how human-like the browser process looks
# (Xvfb-headed Chromium under patchright was still 403'd, run
# 27572914986). The supported path is ZenRows' Scraping API — they run
# our POST through their residential-proxy pool with managed CF bypass.
# Free tier (1k credits/month) covers our 12 monthly runs + a 24-month
# backfill with credits to spare.
#
# Requires repository secret ZENROWS_API_KEY.

on:
  workflow_dispatch:
    inputs:
      month:
        description: "Single month YYYY-MM (overrides from/to)"
        required: false
        default: ""
        type: string
      from:
        description: "Range start YYYY-MM (inclusive)"
        required: false
        default: ""
        type: string
      to:
        description: "Range end YYYY-MM (inclusive)"
        required: false
        default: ""
        type: string
  # schedule:
  #   - cron: '15 4 5 * *'    # re-enable after Xvfb run is proven

concurrency:
  group: bps-indonesia-exim
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 90       # 75 months × ~20 s with xvfb + CF wait ≈ 25 min worst case
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install Python dependencies
        # Just `requests`. ZenRows handles the browser + Cloudflare
        # bypass + residential IP on their side; we make a plain HTTP
        # POST to their API and parse the response. No more Chromium,
        # patchright, or Xvfb on the runner.
        run: pip install requests

      - name: Run BPS scraper
        id: scrape
        working-directory: backend
        env:
          MONTH:            ${{ inputs.month }}
          FROM_M:           ${{ inputs.from }}
          TO_M:             ${{ inputs.to }}
          ZENROWS_API_KEY:  ${{ secrets.ZENROWS_API_KEY }}
        # The scraper's fetch_month() dispatcher auto-routes to ZenRows
        # when ZENROWS_API_KEY is set, so no extra CLI flag is needed.
        run: |
          set +e
          ARGS="--write"
          if [ -n "$MONTH" ]; then
            ARGS="$ARGS --month $MONTH"
          elif [ -n "$FROM_M" ] && [ -n "$TO_M" ]; then
            ARGS="$ARGS --from $FROM_M --to $TO_M"
          fi
          PYTHONPATH=. python -m scraper.sources.bps_indonesia_exim $ARGS
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Commit updated JSON if changed
        if: steps.scrape.outputs.rc == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f frontend/public/data/indonesia_exports.json ]; then
            git add frontend/public/data/indonesia_exports.json
            if git diff --cached --quiet; then
              echo "No JSON change."
            else
              CURRENT=$(git rev-parse --abbrev-ref HEAD)
              git commit -m "data: BPS Indonesia exports $(date -u +%Y-%m-%d) [skip ci]"
              if [ "$CURRENT" = "main" ]; then
                git pull --rebase --autostash --strategy-option=theirs origin main
                git push
              else
                git push origin "HEAD:$CURRENT"
              fi
            fi
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
