name: "0.9 – BPS Indonesia coffee exports (monthly)"

# Pulls Indonesia's national coffee export numbers from BPS. The page sits
# behind Cloudflare Turnstile, which rejects every datacenter IP on
# fingerprint regardless of how human-like the browser process looks.
# After ZenRows (run 27574157444), ScraperAPI (runs 27594067937 /
# 27594246940) and Xvfb-headed Chromium (run 27572914986) all failed
# on their respective free tiers (residential / antibot / premium proxy
# are paid-only across the board), we deploy our own Cloudflare-Worker
# proxy and route the POST through it — intra-CF traffic clears the
# challenge without challenge.
#
# Requires repository secrets:
#   BPS_WORKER_URL    — https://<your-worker>.workers.dev
#   BPS_WORKER_SECRET — shared secret matching the worker's PROXY_SECRET
#
# Source for the worker lives at cf-worker/bps-proxy.js.

on:
  workflow_dispatch:
    inputs:
      month:
        description: "Single month YYYY-MM (overrides from/to)"
        required: false
        default: ""
        type: string
      from:
        description: "Range start YYYY-MM (inclusive)"
        required: false
        default: ""
        type: string
      to:
        description: "Range end YYYY-MM (inclusive)"
        required: false
        default: ""
        type: string
  # schedule:
  #   - cron: '15 4 5 * *'    # re-enable after Xvfb run is proven

concurrency:
  group: bps-indonesia-exim
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 90       # 75 months × ~20 s with xvfb + CF wait ≈ 25 min worst case
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install Python dependencies
        # Just `requests`. ZenRows handles the browser + Cloudflare
        # bypass + residential IP on their side; we make a plain HTTP
        # POST to their API and parse the response. No more Chromium,
        # patchright, or Xvfb on the runner.
        run: pip install requests

      - name: Run BPS scraper
        id: scrape
        working-directory: backend
        env:
          MONTH:              ${{ inputs.month }}
          FROM_M:              ${{ inputs.from }}
          TO_M:                ${{ inputs.to }}
          BPS_WORKER_URL:      ${{ secrets.BPS_WORKER_URL }}
          BPS_WORKER_SECRET:   ${{ secrets.BPS_WORKER_SECRET }}
          SCRAPERAPI_API_KEY:  ${{ secrets.SCRAPERAPI_API_KEY }}
        # The scraper's fetch_month() dispatcher prefers BPS_WORKER_*
        # when both are set; SCRAPERAPI_API_KEY is the fallback once we
        # have a paid plan; patchright is the local-debug last resort.
        run: |
          set +e
          ARGS="--write"
          if [ -n "$MONTH" ]; then
            ARGS="$ARGS --month $MONTH"
          elif [ -n "$FROM_M" ] && [ -n "$TO_M" ]; then
            ARGS="$ARGS --from $FROM_M --to $TO_M"
          fi
          PYTHONPATH=. python -m scraper.sources.bps_indonesia_exim $ARGS
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Commit updated JSON if changed
        if: steps.scrape.outputs.rc == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f frontend/public/data/indonesia_exports.json ]; then
            git add frontend/public/data/indonesia_exports.json
            if git diff --cached --quiet; then
              echo "No JSON change."
            else
              CURRENT=$(git rev-parse --abbrev-ref HEAD)
              git commit -m "data: BPS Indonesia exports $(date -u +%Y-%m-%d) [skip ci]"
              if [ "$CURRENT" = "main" ]; then
                git pull --rebase --autostash --strategy-option=theirs origin main
                git push
              else
                git push origin "HEAD:$CURRENT"
              fi
            fi
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
