name: "0.9 – BPS Indonesia coffee exports (monthly)"

# Pulls Indonesia's national coffee export numbers from BPS (despite the
# lampung. subdomain the data is national — all Indonesian ports appear).
# One POST per (year, month) hits a Next.js server action and returns a
# flat row-per-(HS×port×country) JSON which the scraper rolls into
# frontend/public/data/indonesia_exports.json.
#
# BPS sits behind Cloudflare (cf_clearance / __cf_bm cookies on every
# call), so the scraper uses patchright stealth — same pattern as UCDA
# and cecafe-daily.
#
# Default behaviour: cron at 04:15 UTC on the 5th of each month fetches
# the month-minus-two (covers BPS's typical 6-week publication lag). On
# manual dispatch you can backfill a range or hit a single month.

on:
  workflow_dispatch:
    inputs:
      month:
        description: "Single month YYYY-MM (overrides from/to)"
        required: false
        default: ""
        type: string
      from:
        description: "Range start YYYY-MM (inclusive)"
        required: false
        default: ""
        type: string
      to:
        description: "Range end YYYY-MM (inclusive)"
        required: false
        default: ""
        type: string
  schedule:
    # 5th of each month, 04:15 UTC. BPS publishes the prior-prior month
    # somewhere mid-month, so by the 5th of N we're confident N-2 is up.
    - cron: '15 4 5 * *'

concurrency:
  # Own group, not data-commit — same reasoning as UCDA's workflow.
  group: bps-indonesia-exim
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # patchright provides the Cloudflare-bypass browser context;
        # nothing else needs network egress on the runner.
        run: |
          set -e
          pip install patchright
          python -m patchright install chromium

      - name: Run BPS scraper
        id: scrape
        working-directory: backend
        env:
          MONTH:   ${{ inputs.month }}
          FROM_M:  ${{ inputs.from }}
          TO_M:    ${{ inputs.to }}
        run: |
          set +e
          ARGS="--write"
          if [ -n "$MONTH" ]; then
            ARGS="$ARGS --month $MONTH"
          elif [ -n "$FROM_M" ] && [ -n "$TO_M" ]; then
            ARGS="$ARGS --from $FROM_M --to $TO_M"
          fi
          rc=1
          for attempt in 1 2 3; do
            PYTHONPATH=. python -m scraper.sources.bps_indonesia_exim $ARGS
            rc=$?
            [ $rc -eq 0 ] && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt exited rc=$rc, retrying in 5m..." && sleep 300
          done
          echo "rc=$rc" >> "$GITHUB_OUTPUT"

      - name: Commit updated JSON if changed
        if: steps.scrape.outputs.rc == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f frontend/public/data/indonesia_exports.json ]; then
            git add frontend/public/data/indonesia_exports.json
            if git diff --cached --quiet; then
              echo "No JSON change."
            else
              CURRENT=$(git rev-parse --abbrev-ref HEAD)
              git commit -m "data: BPS Indonesia exports $(date -u +%Y-%m-%d) [skip ci]"
              if [ "$CURRENT" = "main" ]; then
                git pull --rebase --autostash --strategy-option=theirs origin main
                git push
              else
                git push origin "HEAD:$CURRENT"
              fi
            fi
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
