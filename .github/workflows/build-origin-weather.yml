name: "0.3 – Build per-origin weather data (Open-Meteo)"

# Generates frontend/public/data/{origin}_weather.json for every origin in the
# Vietnam chart shape (monthly rain/temp climatology + actuals + daily MTD
# accumulation + 7-day forecast). Open-Meteo isn't reachable from the Claude
# Code web sandbox, so this runs on GitHub's runners and commits the JSON to
# the branch it's dispatched on.
#
# workflow_dispatch (manual) + a monthly schedule to refresh actuals/forecast.

on:
  # TEMPORARY re-fire trigger (removed in the next commit).
  push:
    branches:
      - claude/supply-weather-charts
    paths:
      - .github/workflows/build-origin-weather.yml
  schedule:
    - cron: "17 4 1 * *"   # 04:17 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all (brazil colombia honduras indonesia uganda ethiopia)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Preview only (no write, no commit). Default false."
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate — DRY RUN
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          ARGS=""
          [ -n "$ORIGINS" ] && ARGS="--origins $ORIGINS"
          python backend/scripts/build_origin_weather.py $ARGS

      - name: Generate — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/build_origin_weather.py $ARGS

      - name: Commit generated data
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*_weather.json
          if git diff --cached --quiet; then
            echo "No change to origin weather data."
            exit 0
          fi
          git commit -m "data: refresh per-origin weather (Open-Meteo) [skip ci]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
