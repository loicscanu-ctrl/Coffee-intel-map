name: "0.8 – VN River Flow (NCHMF daily bulletin)"

# Pulls the daily Vietnam short-term water-resources bulletin from NCHMF and
# writes frontend/public/data/vn_water_levels.json. The bulletin lands at
# ~08:00 UTC (15:00 Vietnam local), so this cron runs at 10:00 UTC daily with
# a small retry to tolerate publishing slippage. The scraper itself walks back
# up to 7 days when today's PDF isn't yet posted, so a single missed day
# won't desync the JSON.

on:
  schedule:
    - cron: '0 10 * * *'   # daily 10:00 UTC (after the 08:00 UTC publish)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print result but don't commit"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pdfplumber beautifulsoup4

      - name: Pull NCHMF river-flow bulletin
        working-directory: backend
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m scraper.sources.vn_dam_levels

      - name: Commit + push if changed
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/vn_water_levels.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: VN river-flow bulletin (NCHMF) [skip ci]"
            git pull --rebase --autostash --strategy-option=theirs origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
