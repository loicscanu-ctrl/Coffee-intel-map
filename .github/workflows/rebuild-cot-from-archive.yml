name: "0.4 – One-shot — Rebuild cot_weekly prices from per-contract archive (true max-OI)"

# Sets cot_weekly price_ny/ldn + price_contract_ny/ldn to the TRUE max-OI
# contract's real price for each COT-Tuesday, sourced from the local
# per-contract archive (data/contract_prices_archive.json — OI + price for
# every contract/day over 5y). Final resolution of the Stooq continuous-feed
# issue: label and price now come from the same authoritative source.
#
# Rollback: cot_weekly_price_archive. Re-runnable, idempotent.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no DB writes). Default false = apply."
        required: false
        default: false
        type: boolean
  push:
    paths:
      - '.github/triggers/rebuild-archive-dryrun.txt'
      - '.github/triggers/rebuild-archive-apply.txt'

jobs:
  rebuild:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Install frontend deps (signals export)
        working-directory: frontend
        run: npm ci

      - name: Resolve run mode
        id: mode
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.dry_run }}" = "true" ] && echo "mode=dry-run" >> $GITHUB_OUTPUT || echo "mode=apply" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git log -1 --name-only --pretty=format: | tr -d ' ' | grep -E 'rebuild-archive-(dryrun|apply)\.txt' | head -1 || true)
            echo "$CHANGED" | grep -q "rebuild-archive-apply.txt" && echo "mode=apply" >> $GITHUB_OUTPUT || echo "mode=dry-run" >> $GITHUB_OUTPUT
          fi

      - name: Rebuild — DRY RUN
        if: steps.mode.outputs.mode == 'dry-run'
        working-directory: backend
        env: { DATABASE_URL: "${{ secrets.DATABASE_URL }}" }
        run: |
          set -o pipefail
          python scripts/rebuild_cot_prices_from_archive.py 2>&1 | tee /tmp/rebuild.txt

      - name: Rebuild — APPLY
        if: steps.mode.outputs.mode == 'apply'
        working-directory: backend
        env: { DATABASE_URL: "${{ secrets.DATABASE_URL }}" }
        run: |
          set -o pipefail
          python scripts/rebuild_cot_prices_from_archive.py --apply 2>&1 | tee /tmp/rebuild.txt

      - name: Re-export static JSON
        if: steps.mode.outputs.mode == 'apply'
        working-directory: backend
        env: { DATABASE_URL: "${{ secrets.DATABASE_URL }}" }
        run: python -m scraper.export_static_json

      - name: Refresh signals.json
        if: steps.mode.outputs.mode == 'apply'
        working-directory: frontend
        run: npm run export:signals

      - name: Commit regenerated JSON
        if: steps.mode.outputs.mode == 'apply'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/cot.json frontend/public/data/cot_recent.json frontend/public/data/signals.json
          if git diff --cached --quiet; then echo "No JSON changes."; exit 0; fi
          git commit -m "data: rebuild cot_weekly prices from per-contract archive (true max-OI) [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      - name: Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ steps.mode.outputs.mode }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          ICON="DRY"; [ "$MODE" = "apply" ] && ICON="APPLY"; [ "$JOB_STATUS" = "failure" ] && ICON="FAIL"
          TAIL=$(tail -30 /tmp/rebuild.txt 2>/dev/null || echo "(no output)")
          { printf '%s rebuild cot prices from archive (%s)\nstatus: %s\nrun: %s\n\n%s\n' "$ICON" "$MODE" "$JOB_STATUS" "$RUN_URL" "$TAIL"; } | head -c 3800 > /tmp/tg.txt
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" --data-urlencode "text@/tmp/tg.txt" >/dev/null
