name: "Z – Probe: Acaphe row14 (test)"

# Diagnostic: log into acaphe, fetch iquote.php, and dump row14's raw fields to
# find where the real USD/VND (VCB) rate lives. No DB, no commits.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright requests

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Probe Acaphe
        env:
          ACAPHE_USER: ${{ secrets.ACAPHE_USER }}
          ACAPHE_PASS: ${{ secrets.ACAPHE_PASS }}
        run: python backend/scraper/probe_acaphe.py
