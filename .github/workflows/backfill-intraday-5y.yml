name: "1.97 – Backfill Intraday KC/RC 5y (Barchart continuous)"

# Deep backfill of the 15-min intraday points (RM + KC) from Barchart's
# continuous front-month series, paginating backward to ~5 years. See
# backend/scraper/backfill_intraday_kc_rc.py. workflow_dispatch only; the
# achieved span is whatever Barchart's intraday history actually reaches.

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Target backfill horizon in years (Barchart may cap shorter)"
        required: false
        default: "5"
        type: string

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps + chromium
        run: |
          pip install --quiet playwright
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          playwright install chromium --with-deps || playwright install chromium
      - name: Backfill intraday (paginated)
        working-directory: backend
        run: python -m scraper.backfill_intraday_kc_rc --years "${{ inputs.years }}"
      - name: Commit intraday history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/intraday_kc_rc_15min.json
          git diff --cached --quiet \
            && echo "No change." \
            || (git commit -m "data: backfill intraday KC/RC 15min 5y (Barchart) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
