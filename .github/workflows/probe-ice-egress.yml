name: "Z – Probe: ICE certified-stocks egress (diagnostic)"

# One-shot reconnaissance: does a GitHub runner's open egress reach ICE's
# certified-stock report URLs, or does Akamai serve 403 / an edge-denial page?
# Run this BEFORE writing any parser or reshaping the CertifiedStock schema.
# Pure diagnostic — no DB, no parsing, no commits. Any 200 body is uploaded as
# the `ice-probe` artifact for offline inspection of the real file structure.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Probe ICE certified-stock endpoints
        run: python backend/scraper/probe_ice_stocks.py

      - name: Upload fetched sample bodies (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ice-probe
          path: debug/ice_probe/
          if-no-files-found: warn
          retention-days: 14
