name: "0.10 – Colombia coffee exports (monthly · DANE + FNC)"

# Two Colombian export feeds, both monthly:
#
#   FNC   — Federación Nacional de Cafeteros. Headline production +
#           exports + YoY %, published in PDF bulletins around M+1.
#           Site is WordPress on Cloudflare — runner IP gets challenged
#           occasionally; we fail loud rather than swallow a 403.
#
#   DANE  — Departamento Administrativo Nacional de Estadística. Official
#           customs annex with NANDINA-line granularity (0901.11.10.00
#           suave lavado + 0901.11.90.00 los demás), published in XLS
#           around M+1 to M+2. The download host has been observed
#           returning `x-deny-reason: host_not_allowed` to non-Colombia
#           IPs; if that happens from CI, route through the existing
#           Cloudflare-Worker proxy (cf-worker/bps-proxy.js pattern) or
#           wait for the operator to refresh manually.
#
# Cadence: daily 06:30 UTC during the publication window (5th–20th).
# DANE 404s are silent (file not posted yet) so most polls are cheap.
#
# Workflow-dispatch inputs let the operator (a) skip one source if it's
# blocked and (b) request a specific historical month or count.

on:
  # Cron disabled while the FNC parser is being iterated (PR #375's first
  # run shipped wrong numbers because the regexes captured page numbers /
  # the year). Re-enable once parse_bulletin v2 is verified and DANE's
  # header detection is fixed. Until then: manual-dispatch only.
  # schedule:
  #   - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      run_fnc:
        description: "Run FNC scraper?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_dane:
        description: "Run DANE scraper?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      dane_history:
        description: "DANE: last N months to try (default 3)"
        required: false
        default: "3"
        type: string
      fnc_max:
        description: "FNC: max PDFs to walk (blank = all on listing)"
        required: false
        default: ""
        type: string

concurrency:
  group: scraper-monthly-colombia
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # pdfplumber → FNC PDF parsing; xlrd 1.2.0 → DANE legacy .xls
        # BIFF (xlrd 2.x dropped XLS, and DANE doesn't ship XLSX yet).
        run: pip install requests pdfplumber 'xlrd==1.2.0'

      - name: Run DANE scraper (NANDINA breakdown)
        id: dane
        if: ${{ inputs.run_dane != 'false' }}
        working-directory: backend
        run: |
          set +e
          ARGS="--write --history ${{ inputs.dane_history || '3' }}"
          PYTHONPATH=. python -m scraper.sources.dane_colombia_exports $ARGS
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Run FNC scraper (production + headline exports)
        id: fnc
        if: ${{ inputs.run_fnc != 'false' }}
        working-directory: backend
        run: |
          set +e
          ARGS="--write"
          if [ -n "${{ inputs.fnc_max }}" ]; then
            ARGS="$ARGS --max ${{ inputs.fnc_max }}"
          fi
          PYTHONPATH=. python -m scraper.sources.fnc_colombia_monthly $ARGS
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Commit updated colombia_supply.json if changed
        # Run even when one source failed — the other may have updated
        # the file. The two scrapers merge into the same `exports.monthly`
        # block; DANE rows win when both touch the same month.
        if: always() && (steps.dane.outputs.rc == '0' || steps.fnc.outputs.rc == '0')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f frontend/public/data/colombia_supply.json ]; then
            git add frontend/public/data/colombia_supply.json
            if git diff --cached --quiet; then
              echo "No Colombia exports change."
            else
              CURRENT=$(git rev-parse --abbrev-ref HEAD)
              git commit -m "data: Colombia exports refresh $(date -u +%Y-%m-%d) [skip ci]"
              if [ "$CURRENT" = "main" ]; then
                git pull --rebase --autostash --strategy-option=theirs origin main
                git push
              else
                git push origin "HEAD:$CURRENT"
              fi
            fi
          fi

      - name: Notify on hard failure
        # Soft-fail: DANE 404 and FNC empty-listing are normal during
        # off-window days. Only escalate when BOTH scrapers crashed AND
        # nothing was committed — that points to a deeper outage.
        if: failure() && steps.dane.outputs.rc != '0' && steps.fnc.outputs.rc != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} — both DANE and FNC failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
