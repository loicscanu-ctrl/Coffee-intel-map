name: "0.5 – Weekly — Vegetation Health Index (NOAA STAR VHI)"

# Weekly NOAA STAR VHI per coffee region, bbox-averaged into the origin weather
# JSONs (additive `vhi` per province). The NOAA host is blocked from the Claude
# sandbox but reachable from GitHub runners. VHI is a weekly product, so this
# runs weekly + on demand. Graceful: if the file/format isn't found it commits
# nothing. VERIFY the VHI_URL/format on the first dispatch (see fetch_vhi.py).

on:
  schedule:
    - cron: '30 7 * * 2'   # Tuesdays 07:30 UTC (after NOAA's weekly publish)
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all"
        required: false
        default: ""
        type: string

jobs:
  vhi:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests netCDF4 numpy   # netCDF4 reads NOAA STAR's gridded VHI

      - name: Fetch + apply VHI
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/fetch_vhi.py $ARGS

      - name: Commit updated weather data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*_weather.json
          if git diff --cached --quiet; then
            echo "No VHI change to commit."
            exit 0
          fi
          git commit -m "data: weekly NOAA STAR VHI per region [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
