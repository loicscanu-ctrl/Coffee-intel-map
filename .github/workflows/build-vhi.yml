name: "0.5 – Weekly — Vegetation Health Index (NOAA STAR VHI)"

# Weekly NOAA STAR VHI per coffee region, via the admin-1 text export endpoint
# (get_TS_admin.php). Writes frontend/public/data/vhi_{origin}.json — a SEPARATE
# file from {origin}_weather.json so the daily weather rebuild can't wipe these
# weekly fields. NOAA's host is blocked from the Claude sandbox but reachable
# from GitHub runners.

on:
  schedule:
    # Saturday 23:00 UTC — comfortably after NOAA's weekly Saturday batch.
    - cron: '0 23 * * 6'
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys (brazil colombia …), or blank for all"
        required: false
        default: ""
        type: string

jobs:
  vhi:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Switched to NOAA STAR's text endpoint — only `requests` needed.
        # No more netCDF4 / numpy: the gridded approach never produced data.
        run: pip install requests

      - name: Fetch VHI (3 attempts)
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          for attempt in 1 2 3; do
            python backend/scripts/fetch_vhi.py $ARGS && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Commit updated VHI data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/vhi_*.json
          if git diff --cached --quiet; then
            echo "No VHI change to commit."
            exit 0
          fi
          git commit -m "data: weekly NOAA STAR VHI per region [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
