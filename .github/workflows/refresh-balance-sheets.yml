name: "3.4 – Semi-annual · Multi-source balance sheets (BR/CO/ID/UG)"

# Keeps the per-origin production-estimate seed files
# (frontend/public/data/{br,id,ug}_balance_sheet.json) fed.
#
# What's automated: the USDA column. psd_coffee + usda_gain_pdf already
# merge USDA production into demand_stocks.json on the daily cadence;
# this job syncs that live USDA figure into each balance-sheet seed so
# the S&D card's equation strip + production-spread never drift from the
# backbone bars.
#
# What's NOT automated: CONAB / GAEKI / UCDA / ICO. Those publish as PDFs
# / press releases with no dependable machine feed (ICO 403s datacenter
# IPs; GAEKI has no API). The job posts a Telegram checklist with the
# report URLs so the operator refreshes those by hand twice a year.
#
# Cadence: 20 Jun + 20 Dec — a few weeks after USDA's June Coffee Annual
# and December Semi-Annual, which is also when CONAB / GAEKI / UCDA / ICO
# have published their matching updates.

on:
  schedule:
    - cron: '0 6 20 6,12 *'   # 06:00 UTC, 20 Jun & 20 Dec
  workflow_dispatch:

concurrency:
  group: refresh-balance-sheets
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync USDA column from demand_stocks.json
        id: refresh
        working-directory: backend
        run: |
          set -e
          # Capture the builder report — it lists the USDA deltas applied
          # plus the manual-source checklist, both of which we forward to
          # Telegram below.
          PYTHONPATH=. python -m scraper.build_balance_sheets | tee /tmp/bs_report.txt

      - name: Commit refreshed seeds if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/br_balance_sheet.json \
                  frontend/public/data/co_balance_sheet.json \
                  frontend/public/data/id_balance_sheet.json \
                  frontend/public/data/ug_balance_sheet.json \
                  frontend/public/data/vn_farmer_economics.json
          if git diff --cached --quiet; then
            echo "No balance-sheet change."
          else
            git commit -m "data: refresh balance-sheet USDA column $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase --autostash --strategy-option=theirs origin main
            git push
          fi

      - name: Telegram — refresh summary + manual checklist
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          REPORT=$(cat /tmp/bs_report.txt 2>/dev/null || echo "builder did not run")
          # Telegram caps messages at 4096 chars; the report is small but
          # truncate defensively. Assemble the body in one variable so the
          # YAML run-block stays a clean literal scalar.
          HEADER="📊 Semi-annual balance-sheet refresh — USDA auto-synced, please update the manual sources:"
          MSG=$(printf '%s\n\n%s\n\nRun: %s' "$HEADER" "$(printf '%s' "$REPORT" | head -c 3500)" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" || true

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
