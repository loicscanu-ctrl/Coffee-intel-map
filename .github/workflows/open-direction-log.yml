name: "1.16 – Open-Direction Prediction Log"

# Pre-open runner for the Robusta open-price-direction model: ONE prediction,
# TWO artifacts. Logs a fresh overnight-gap prediction for the upcoming session
# (append-only track record), resolves prior pending predictions, and writes
# the SAME prediction into quant_report.json["open_direction"] (the Macro
# panel). Reads the intraday 15-min file (refreshed 20:13 UTC prior eve) and,
# when present, fx_intraday_snapshots.json — both fresh by 03:00 UTC. The
# Telegram morning brief chains on this workflow's completion.

on:
  schedule:
    # 03:07 UTC weekdays, pre-open. Off the :00 mark — top-of-hour slots hit
    # GH Actions' well-known cron skip/delay (observed 2026-07-02: the 03:00
    # slot drifted to 06:41). The FX 03:00-UTC anchor is unaffected by fire
    # time by construction (close of the ≤02:45 bar), and the brief's 03:41
    # fallback cron still sits safely after this.
    - cron: '7 3 * * 1-5'
  workflow_dispatch:

concurrency:
  group: data-commit          # serialize with the other main-pushers
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      # FX anchors for the cci_overnight feature (17:30-London / 03:00-UTC per
      # CCI pair). Forward-accumulating: the feature activates in the model
      # once ≥40 snapshot days exist. Non-blocking — the model runs fine on
      # kc_after + days_since_roll while this warms up or if Barchart hiccups.
      - name: Fetch intraday FX snapshots (non-blocking)
        working-directory: backend
        continue-on-error: true
        run: python -m scraper.fetch_fx_snapshots

      - name: Run open-direction prediction log
        working-directory: backend
        run: python -m scraper.quant_model.open_direction_log

      - name: Commit updated history if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/open_direction_history.json \
                  frontend/public/data/quant_report.json
          [ -f frontend/public/data/fx_intraday_snapshots.json ] \
            && git add frontend/public/data/fx_intraday_snapshots.json || true
          [ -f data/brent_intraday_anchors.json ] \
            && git add data/brent_intraday_anchors.json || true
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: open-direction prediction log [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
