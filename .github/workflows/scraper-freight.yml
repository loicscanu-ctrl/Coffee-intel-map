name: "1.2 – Freight Rate Scraper"

on:
  schedule:
    # Fri/Sat/Sun only. The freight index updates end-of-week — verified over
    # 3 months of history: 0 rate changes Mon-Thu, all 16 changes fell Fri-Sun.
    # 02:19 UTC — off the :00 mark to dodge GH cron skip.
    - cron: '19 2 * * 5,6,0'
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install playwright sqlalchemy psycopg2-binary python-dotenv

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run Freightos scraper
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.run_freight
