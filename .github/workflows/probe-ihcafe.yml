name: "Z – Probe: IHCAFE comercialización bulletin (test)"

# Diagnostic: locate IHCAFE's "Boletín Estadístico de Comercialización" PDF
# (avg export price per 46 kg sack), download the latest, and dump its text so
# we can build the Honduras scraper. No DB, no commits.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright beautifulsoup4 pdfplumber

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Probe IHCAFE
        run: python backend/scraper/probe_ihcafe.py

      - name: Upload fetched bodies (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ihcafe-probe
          path: debug/ihcafe_probe/
          if-no-files-found: warn
          retention-days: 14
