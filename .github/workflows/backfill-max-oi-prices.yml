name: "0.1 – One-shot — Backfill COT max-OI prices (5y)"

# Manually-triggered, one-time backfill. Walks the last 5 years of cot_weekly,
# fetches per-Tuesday OI history + Stooq prices, picks the max-OI contract,
# and writes price_{ny,ldn} + price_contract_{ny,ldn}. Then re-exports the
# static JSON and refreshes signals.json so the live chart picks up the
# historical contract-switch markers.
#
# NOT scheduled — only runs on workflow_dispatch. Safe to re-run; the script
# archives every modified row to cot_weekly_price_archive before each write.

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "Backfill window in weeks (260 = 5y, 156 = 3y, 104 = 2y)"
        required: true
        default: "260"
        type: string
      dry_run:
        description: "Dry-run only (no DB writes, no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Install frontend dependencies (for signals export)
        working-directory: frontend
        run: npm ci

      - name: Backfill — DRY RUN
        if: ${{ inputs.dry_run }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== DRY RUN — no DB writes ==="
          python scripts/backfill_max_oi_prices.py --weeks ${{ inputs.weeks }}

      - name: Backfill — APPLY
        if: ${{ !inputs.dry_run }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== APPLY — writing to DB (rollback table: cot_weekly_price_archive) ==="
          python scripts/backfill_max_oi_prices.py --apply --weeks ${{ inputs.weeks }}

      - name: Re-export static JSON (cot.json reflects new contract symbols)
        if: ${{ !inputs.dry_run }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Refresh signals.json (engine sees updated price track)
        if: ${{ !inputs.dry_run }}
        working-directory: frontend
        run: npm run export:signals

      - name: Commit regenerated static JSON
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            frontend/public/data/cot.json \
            frontend/public/data/cot_recent.json \
            frontend/public/data/signals.json

          if git diff --cached --quiet; then
            echo "No JSON changes after backfill — DB writes didn't shift any row visible to the export."
            exit 0
          fi

          git commit -m "data: backfill max-OI prices + contract symbols (${{ inputs.weeks }}w) [skip ci]"

          # Same rebase strategy as 1.4 export-and-publish: scraper-produced
          # JSON is canonical, so on conflict we keep our side.
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Review the log above. Re-run with dry_run=false to apply."
          else
            echo "Backfill complete. The Industry Pulse chart will pick up the new contract-switch markers on the next page load."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
