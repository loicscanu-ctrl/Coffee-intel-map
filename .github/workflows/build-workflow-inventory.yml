name: "0.2 – Refresh Workflow Inventory"

# Re-builds frontend/public/data/workflows_inventory.json whenever a workflow
# file or the inventory script changes. Keeps the Data Platform Map page's
# "Live Workflow Inventory" section in sync with the actual YAML — no manual
# editing of the data file required.
#
# Path filter excludes the inventory JSON itself, so the job's own commit
# (which only touches the JSON) doesn't re-fire it → no infinite loop.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'backend/scripts/build_workflow_inventory.py'
  workflow_dispatch:

concurrency:
  group: build-workflow-inventory
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Rebuild workflow inventory
        run: python backend/scripts/build_workflow_inventory.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/workflows_inventory.json
          if git diff --cached --quiet; then
            echo "No inventory change."
            exit 0
          fi
          git commit -m "data: refresh workflow inventory [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push
