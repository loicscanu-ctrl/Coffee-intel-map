name: "1.10 – Daily Weather Fetch & Accumulate"

# Dedicated, independent weather pipeline — decoupled from "1.4 Export and
# Publish". Each day it fetches daily rain + temperature for every origin's
# producing regions from Open-Meteo's forecast API (api.open-meteo.com — the
# reachable host; the archive host is blocked), appends the actuals into the
# per-origin accumulator backend/seed/weather_history/{origin}.json, and
# rebuilds frontend/public/data/{origin}_weather.json (the file the charts
# read). The history grows daily; the charts' actual/daily/forecast series are
# live, while the climatology bands stay seeded until real history fills a year.

on:
  schedule:
    # 01:53 UTC daily — early window ahead of every other data-commit job,
    # moved off the :00 mark (GH cron skip risk documented across this repo)
    # so the ~10-min run reliably lands before export-and-publish at 02:41.
    - cron: "53 1 * * *"
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all"
        required: false
        default: ""
        type: string

concurrency:
  group: weather-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # sqlalchemy/psycopg2/dotenv/jinja2 are needed for the optional
        # news-feed drought-gate badge emitted at the tail of the weather
        # rebuild (backend/scripts/weather_news_emit.py). The upsert is a
        # no-op when DATABASE_URL is unset.
        run: pip install requests scipy sqlalchemy psycopg2-binary python-dotenv jinja2

      - name: Fetch + accumulate + rebuild (3 attempts)
        env:
          ORIGINS: ${{ inputs.origins }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          for attempt in 1 2 3; do
            python backend/scripts/fetch_origin_weather.py $ARGS && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Evaluate IPHM agronomic alerts (3 attempts)
        # Runs after the weather rebuild so SPI/SPEI/forecast are fresh.
        # Writes frontend/public/data/agronomic_alerts.json AND merges the
        # flattened entries into signals.json so the Telegram bot's existing
        # consumer surfaces them automatically.
        run: |
          for attempt in 1 2 3; do
            PYTHONPATH=backend python -m scraper.agronomic_alerts --write && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Compute weather analogs (Brazil arabica, 3 attempts)
        # Reads backend/seed/weather_history/brazil.json + the historical
        # production seed, ranks past years by Euclidean distance on per-
        # phenology-stage (rain, temp) signatures, and writes the analog
        # forecast JSON the BrazilWeatherAnalogs panel consumes.
        run: |
          for attempt in 1 2 3; do
            PYTHONPATH=backend python backend/scripts/compute_weather_analogs.py && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Commit updated weather data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/seed/weather_history/*.json frontend/public/data/*_weather.json
          git add frontend/public/data/agronomic_alerts.json frontend/public/data/signals.json
          git add frontend/public/data/weather_analogs_brazil.json
          if git diff --cached --quiet; then
            echo "No weather change."
            exit 0
          fi
          git commit -m "data: daily weather fetch + accumulate [skip ci]"
          ok=0
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash --strategy-option=theirs origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then ok=1; break; fi
            echo "push attempt $attempt failed (concurrent push?); retrying in $((5*attempt))s…"; sleep $((5 * attempt))
          done
          [ "$ok" = 1 ] || { echo "push failed after 5 attempts"; exit 1; }

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
