name: Daily OI Snapshot

on:
  schedule:
    - cron: "0 2 * * 1-5"   # 02:00 UTC every weekday (Mon–Fri)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  fetch-oi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch OI and update JSON
        run: python backend/scraper/fetch_oi_json.py

      - name: Copy OI history to frontend
        run: cp data/oi_history.json frontend/public/data/oi_history.json

      - name: Commit updated OI data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/oi_history.json frontend/public/data/oi_history.json
          git diff --cached --quiet || git commit -m "chore: daily OI snapshot $(date -u +%Y-%m-%d) [skip ci]"
          git push
