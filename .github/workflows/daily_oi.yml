name: "1.3 – Daily OI Snapshot"

on:
  schedule:
    # NOTE: GH cron on this repo fires 4-5h LATE systematically (verified
    # 2026-06-10 against 10 days of run history — every scheduled workflow
    # repo-wide). This cron is therefore the FALLBACK; the primary trigger
    # is the workflow_run chain off 1.1, whose head is dispatched at an
    # exact time by an external cron service (see runbook in repo issue).
    - cron: "13 2 * * 1-5"  # 02:13 UTC every weekday — off the :00 mark to dodge GH cron skip
  workflow_dispatch:
  workflow_run:
    # Chain off the daily scraper so OI lands minutes after the scrape
    # instead of waiting for this workflow's own (hours-late) cron. Only
    # dispatch/schedule-originated scraper runs chain through — push-
    # triggered scraper verifications (every backend/scraper/** merge)
    # shouldn't cascade a full OI fetch.
    workflows: ["1.1 – Daily News Scraper"]
    types: [completed]

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  fetch-oi:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.event == 'workflow_dispatch' || github.event.workflow_run.event == 'schedule')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Weekend guard — no exchange OI to snapshot on Sat/Sun
        id: weekday
        # The cron is already Mon-Fri, but the workflow_run chain fires daily
        # (the news scraper runs 7 days). Exit-success skip keeps the chain
        # alive: export-and-publish still triggers off this run's completion.
        run: |
          dow=$(date -u +%u)
          if [ "$dow" -ge 6 ]; then
            echo "Weekend (dow=$dow) — skipping OI snapshot."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.weekday.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Cache Playwright browser
        if: steps.weekday.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        if: steps.weekday.outputs.skip != 'true'
        # sqlalchemy/psycopg2/dotenv/jinja2 added so the orchestrator's tail
        # step (oi_news_emit) can write a news_feed row with the regime-matrix
        # commentary. No-op when DATABASE_URL is unset.
        run: |
          pip install playwright sqlalchemy psycopg2-binary python-dotenv jinja2
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          playwright install chromium --with-deps || playwright install chromium

      - name: Fetch OI (3 attempts)
        if: steps.weekday.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          for attempt in 1 2 3; do
            python backend/scraper/fetch_oi_json.py && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Copy OI history to frontend
        if: steps.weekday.outputs.skip != 'true'
        run: cp data/oi_history.json frontend/public/data/oi_history.json

      - name: Validate output
        if: steps.weekday.outputs.skip != 'true'
        run: |
          python -c "
          import json, sys, subprocess
          sys.path.insert(0, 'backend')
          from scraper.validate_export import validate_oi_history
          data = json.load(open('frontend/public/data/oi_history.json'))
          ok, reason = validate_oi_history(data)
          if not ok:
              print(f'[validate] oi_history.json FAILED: {reason} — restoring HEAD version')
              subprocess.run(['git', 'checkout', '--', 'data/oi_history.json', 'frontend/public/data/oi_history.json'])
          "

      - name: Commit updated OI data
        if: steps.weekday.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/oi_history.json frontend/public/data/oi_history.json data/contract_prices_archive.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: daily OI snapshot $(date -u +%Y-%m-%d) [skip ci]"
          # main is a busy branch (daily exporters, PR merges and other bots push
          # concurrently). A single pull-then-push races and gets rejected with
          # "cannot lock ref 'refs/heads/main'", which failed the whole job and
          # fired a false-alarm Telegram alert. Retry rebase-onto-latest + push.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash --strategy-option=theirs origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected (main moved); retrying…"
            sleep $((RANDOM % 6 + 3))
          done
          echo "::error::OI snapshot push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
