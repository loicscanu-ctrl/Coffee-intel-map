name: "Z – Backfill: Brazil B3 Arabica 4/5"

# One-shot: walk the noticiasagricolas date-URLs for the B3 "Café Arábica 4/5
# (Pregão Regular)" curve to build brazil_b3_arabica.json (front contract +
# full curve per date), and commit it to this branch.

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Backfill start date (YYYY-MM-DD)"
        required: false
        default: "2023-06-01"

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install beautifulsoup4
      - name: Backfill B3 arabica history
        working-directory: backend
        run: python -m scraper.sources.brazil_b3_arabica backfill "${{ inputs.start }}"
      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/brazil_b3_arabica.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: backfill Brazil B3 Arabica 4/5 history [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin "${{ github.ref_name }}" && git push && exit 0
              sleep $((RANDOM % 5 + 3))
            done
            echo "::error::push failed"; exit 1
          fi
