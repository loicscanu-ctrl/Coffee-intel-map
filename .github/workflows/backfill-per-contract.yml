name: "0.3 – One-shot — Backfill COT under max-OI using yfinance per-contract"

# Manually-triggered. Pulls TRUE per-contract historical closes from Yahoo
# Finance for each (Tuesday, max-OI contract) pair and writes
# price_{ny,ldn} + price_contract_{ny,ldn}. Resolves the Stooq continuous-
# front-month trap (May 2026) WITHOUT needing Interactive Brokers.
#
# Run this INSTEAD OF workflow 0.2 (relabel-frontmonth). This workflow
# is the proper fix: it restores max-OI labelling (the user's original
# intent in PR #63) AND writes correct per-contract prices. The relabel
# workflow was only a stopgap that preserved the continuous-front-month
# prices while making the labels honest.
#
# NY (Arabica) uses .NYB suffix — verified single-suffix convention.
# LDN (Robusta) tries .NYB, .L, and bare ticker; logs which suffix wins
# per contract so we can iterate if coverage is patchy.
#
# Re-runnable; archives every modified row to cot_weekly_price_archive.

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "Backfill window in weeks (260 = 5y default)"
        required: true
        default: "260"
        type: string
      markets:
        description: "Markets to backfill (ny, ldn, or both)"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - ny
          - ldn
      dry_run:
        description: "Dry-run only (no DB writes). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl "yfinance>=0.2.40"

      - name: Install frontend dependencies (for signals export)
        working-directory: frontend
        run: npm ci

      - name: Resolve markets argument
        id: mkts
        run: |
          if [ "${{ inputs.markets }}" = "both" ]; then
            echo "value=ny,ldn" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.markets }}" >> $GITHUB_OUTPUT
          fi

      - name: Backfill — DRY RUN
        if: ${{ inputs.dry_run }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== DRY RUN — no DB writes ==="
          python scripts/backfill_per_contract_yfinance.py --weeks ${{ inputs.weeks }} --markets ${{ steps.mkts.outputs.value }}

      - name: Backfill — APPLY
        if: ${{ !inputs.dry_run }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== APPLY — writing to DB (rollback: cot_weekly_price_archive) ==="
          python scripts/backfill_per_contract_yfinance.py --apply --weeks ${{ inputs.weeks }} --markets ${{ steps.mkts.outputs.value }}

      - name: Re-export static JSON (cot.json reflects new prices + contracts)
        if: ${{ !inputs.dry_run }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Refresh signals.json (engine sees updated price track)
        if: ${{ !inputs.dry_run }}
        working-directory: frontend
        run: npm run export:signals

      - name: Commit regenerated static JSON
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            frontend/public/data/cot.json \
            frontend/public/data/cot_recent.json \
            frontend/public/data/signals.json

          if git diff --cached --quiet; then
            echo "No JSON changes after backfill — DB writes didn't shift any row visible to the export."
            exit 0
          fi

          git commit -m "data: backfill per-contract prices via yfinance (${{ inputs.weeks }}w, ${{ inputs.markets }}) [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Review the log above:"
            echo "  - 'WOULD' lines show every row that would be written"
            echo "  - '[skip] no Yahoo data' lines indicate contracts where yfinance returned nothing"
            echo "    (will need a different suffix or fallback to FND-based labels)"
            echo "Re-run with dry_run=false to apply."
          else
            echo "Backfill complete. Switch markers on Industry Pulse now reflect TRUE max-OI"
            echo "rolls with per-contract prices. Misalignment from the Stooq backfill is fixed."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
