name: "0.3 – One-shot — Backfill COT under max-OI using yfinance per-contract"

# Manually-triggered. Pulls TRUE per-contract historical closes from Yahoo
# Finance for each (Tuesday, max-OI contract) pair and writes
# price_{ny,ldn} + price_contract_{ny,ldn}. Resolves the Stooq continuous-
# front-month trap (May 2026) WITHOUT needing Interactive Brokers.
#
# Run this INSTEAD OF workflow 0.2 (relabel-frontmonth). This workflow
# is the proper fix: it restores max-OI labelling (the user's original
# intent in PR #63) AND writes correct per-contract prices. The relabel
# workflow was only a stopgap that preserved the continuous-front-month
# prices while making the labels honest.
#
# NY (Arabica) uses .NYB suffix — verified single-suffix convention.
# LDN (Robusta) tries .NYB, .L, and bare ticker; logs which suffix wins
# per contract so we can iterate if coverage is patchy.
#
# Re-runnable; archives every modified row to cot_weekly_price_archive.

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "Backfill window in weeks (260 = 5y default)"
        required: true
        default: "260"
        type: string
      markets:
        description: "Markets to backfill (ny, ldn, or both)"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - ny
          - ldn
      dry_run:
        description: "Dry-run only (no DB writes). Default false = apply."
        required: false
        default: false
        type: boolean
  # Sentinel-file push trigger. Touching either file fires the workflow
  # automatically, with mode forced based on which file changed. Lets
  # us drive the workflow from a phone (Claude pushes a kick commit and
  # the Telegram summary lands on your device a few minutes later).
  push:
    paths:
      - '.github/triggers/yfinance-dryrun.txt'
      - '.github/triggers/yfinance-apply.txt'

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl "yfinance>=0.2.40"

      - name: Install frontend dependencies (for signals export)
        working-directory: frontend
        run: npm ci

      - name: Resolve run mode
        id: mode
        # Three cases:
        #   workflow_dispatch          → use inputs.*
        #   push (yfinance-dryrun.txt) → dry-run, default args
        #   push (yfinance-apply.txt)  → apply, default args
        # Output env vars: RUN_MODE (dry-run|apply), WEEKS, MARKETS
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MARKETS_RAW="${{ inputs.markets }}"
            [ "$MARKETS_RAW" = "both" ] && MARKETS="ny,ldn" || MARKETS="$MARKETS_RAW"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "mode=dry-run" >> $GITHUB_OUTPUT
            else
              echo "mode=apply" >> $GITHUB_OUTPUT
            fi
            echo "weeks=${{ inputs.weeks }}" >> $GITHUB_OUTPUT
            echo "markets=$MARKETS" >> $GITHUB_OUTPUT
          else
            # push event — inspect last commit for sentinel file
            CHANGED=$(git log -1 --name-only --pretty=format: | tr -d ' ' | grep -E 'yfinance-(dryrun|apply)\.txt' | head -1 || true)
            if echo "$CHANGED" | grep -q "yfinance-apply.txt"; then
              echo "mode=apply" >> $GITHUB_OUTPUT
            else
              echo "mode=dry-run" >> $GITHUB_OUTPUT
            fi
            echo "weeks=260" >> $GITHUB_OUTPUT
            echo "markets=ny,ldn" >> $GITHUB_OUTPUT
          fi
          echo "mode=$(cat $GITHUB_OUTPUT | grep ^mode | tail -1)"
          echo "weeks=$(cat $GITHUB_OUTPUT | grep ^weeks | tail -1)"
          echo "markets=$(cat $GITHUB_OUTPUT | grep ^markets | tail -1)"

      - name: Backfill — DRY RUN
        id: dryrun
        if: steps.mode.outputs.mode == 'dry-run'
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          echo "=== DRY RUN — no DB writes ==="
          python scripts/backfill_per_contract_yfinance.py \
            --weeks ${{ steps.mode.outputs.weeks }} \
            --markets ${{ steps.mode.outputs.markets }} 2>&1 | tee /tmp/backfill_output.txt

      - name: Backfill — APPLY
        id: apply
        if: steps.mode.outputs.mode == 'apply'
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          echo "=== APPLY — writing to DB (rollback: cot_weekly_price_archive) ==="
          python scripts/backfill_per_contract_yfinance.py --apply \
            --weeks ${{ steps.mode.outputs.weeks }} \
            --markets ${{ steps.mode.outputs.markets }} 2>&1 | tee /tmp/backfill_output.txt

      - name: Re-export static JSON (cot.json reflects new prices + contracts)
        if: steps.mode.outputs.mode == 'apply'
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Refresh signals.json (engine sees updated price track)
        if: steps.mode.outputs.mode == 'apply'
        working-directory: frontend
        run: npm run export:signals

      - name: Commit regenerated static JSON
        if: steps.mode.outputs.mode == 'apply'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            frontend/public/data/cot.json \
            frontend/public/data/cot_recent.json \
            frontend/public/data/signals.json

          if git diff --cached --quiet; then
            echo "No JSON changes after backfill — DB writes didn't shift any row visible to the export."
            exit 0
          fi

          git commit -m "data: backfill per-contract prices via yfinance (${{ steps.mode.outputs.weeks }}w, ${{ steps.mode.outputs.markets }}) [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      - name: Telegram summary (always — success or fail)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ steps.mode.outputs.mode }}
          MARKETS: ${{ steps.mode.outputs.markets }}
          WEEKS: ${{ steps.mode.outputs.weeks }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          ICON="DRY"
          [ "$MODE" = "apply" ] && ICON="APPLY"
          [ "$JOB_STATUS" = "failure" ] && ICON="FAIL"

          HEAD=$(head -10 /tmp/backfill_output.txt 2>/dev/null || echo "")
          TAIL=$(tail -60 /tmp/backfill_output.txt 2>/dev/null || echo "(no output captured)")
          # Compose into a temp file; Telegram caps at ~4096 chars.
          {
            printf '%s yfinance backfill (%s, %s, %sw)\n' "$ICON" "$MODE" "$MARKETS" "$WEEKS"
            printf 'status: %s\n' "$JOB_STATUS"
            printf 'run: %s\n\n' "$RUN_URL"
            printf -- '--- head ---\n%s\n--- tail ---\n%s\n' "$HEAD" "$TAIL"
          } | head -c 3800 > /tmp/tg_msg.txt

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@/tmp/tg_msg.txt" >/dev/null
          echo "Sent Telegram summary."

      - name: Log-only summary (in workflow output)
        if: always()
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "dry-run" ]; then
            echo "Dry-run complete. Telegram message contains the head+tail of the output."
            echo "Full log is in this run's web UI under the 'Backfill — DRY RUN' step."
          else
            echo "Apply complete. Switch markers on Industry Pulse now reflect TRUE max-OI rolls."
          fi
