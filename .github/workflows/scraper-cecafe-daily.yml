name: "1.7 – Cecafe Daily Registration"

on:
  schedule:
    # Run every day at 09:00 UTC (06:00 Brasília) — Cecafe publishes previous day's data overnight
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 4 fetch attempts with 5-min gaps + a 45s socket timeout each can take
    # ~16 min when Cecafe is flaky; keep the job cap comfortably above that so
    # the retries actually run (the old 10-min cap killed the job mid-retry).
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Run Cecafe scraper (4 attempts)
        working-directory: backend
        run: |
          for attempt in 1 2 3 4; do
            python -m scraper.fetch_cecafe_daily && break
            [ $attempt -lt 4 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Upload fetched page (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cecafe-daily-page
          path: debug/*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Validate output
        run: |
          python -c "
          import json, sys, subprocess
          sys.path.insert(0, 'backend')
          from scraper.validate_export import validate_cecafe_daily
          data = json.load(open('frontend/public/data/cecafe_daily.json'))
          ok, reason = validate_cecafe_daily(data)
          if not ok:
              print(f'[validate] cecafe_daily.json FAILED: {reason} — restoring HEAD version')
              subprocess.run(['git', 'checkout', '--', 'frontend/public/data/cecafe_daily.json'])
          "

      - name: Commit updated JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/cecafe_daily.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: cecafe daily registration $(date -u +%Y-%m-%d) [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      # Vercel redeploy is handled by the standalone "1.12 – Daily Publish"
      # workflow (10:00 UTC, after this job), so a flaky Cecafe fetch no longer
      # blocks the daily deploy.

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
