name: "1.7 – Cecafe Daily Registration"

on:
  schedule:
    # Single daily window at 17:00 UTC (14:00 Brasília). Chosen as the LATE
    # window deliberately: Cecafe publishes the day's resumo at a variable
    # hour, and the afternoon run is the most likely to catch the page after
    # it has advanced to the current day (an earlier run often finds
    # yesterday's data still showing — see the "page reference date ==
    # last stored, nothing new to commit" diag in the log).
    #
    # History: this used to be three windows (09/13/17 UTC) as a hedge
    # against Cecafe's edge refusing GH Actions IPs for 30+ min stretches.
    # The patchright browser-render path (added June 2026) now clears the
    # bot-challenge wall reliably, so the extra windows became redundant
    # cost (each spins up a headless chromium). Trimmed to one on the
    # owner's call. workflow_dispatch stays for manual catch-up / one-offs.
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 3 attempts × (≤60s request + ≤45s patchright render) + 60s + 240s gaps
    # ≈ 12 min worst case. Chromium install adds ~1 min. 20 min leaves
    # headroom, still well under the original single-window 25min cap.
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # requests for the fast-path fetch; pdfplumber for the PDF mirror
        # fallback. patchright (Cloudflare-evading Playwright fork) renders
        # past the bot-challenge wall Cecafé's edge began serving to GH
        # Actions IPs in June 2026 — same proven bypass scraper-daily.yml
        # uses for giacaphe.com. Installed explicitly (not via requirements)
        # because pip's resolver silently drops it against playwright==1.44.0.
        run: |
          set -e
          pip install pdfplumber requests
          pip install patchright
          python -m patchright install chromium

      - name: Run Cecafe scraper (3 attempts within the daily window)
        working-directory: backend
        # 3 in-run attempts with 60s/240s spacing. Now that there's a single
        # daily window (no 13:00/17:00 backups), these within-run retries are
        # the only safety net for a transient blip — patchright clears the
        # challenge on the first try in the normal case, so the retries
        # mostly cover a one-off network hiccup. The run is idempotent: a
        # page that hasn't advanced to a new day commits nothing.
        run: |
          set +e
          for attempt in 1 2 3; do
            python -m scraper.fetch_cecafe_daily
            rc=$?
            [ $rc -eq 0 ] && exit 0
            if [ $attempt -lt 3 ]; then
              sleep_for=$((60 * attempt * attempt))   # 60, 240, ...
              echo "Attempt $attempt failed (rc=$rc); retrying in ${sleep_for}s..."
              sleep $sleep_for
            fi
          done
          echo "All 3 attempts failed within this cron window — next scheduled cron will retry."
          exit 1

      - name: Upload fetched page (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cecafe-daily-page
          path: debug/*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Validate output
        run: |
          python -c "
          import json, sys, subprocess
          sys.path.insert(0, 'backend')
          from scraper.validate_export import validate_cecafe_daily
          data = json.load(open('frontend/public/data/cecafe_daily.json'))
          ok, reason = validate_cecafe_daily(data)
          if not ok:
              print(f'[validate] cecafe_daily.json FAILED: {reason} — restoring HEAD version')
              subprocess.run(['git', 'checkout', '--', 'frontend/public/data/cecafe_daily.json'])
          "

      - name: Commit updated JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/cecafe_daily.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: cecafe daily registration $(date -u +%Y-%m-%d) [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      # Vercel redeploy is handled by the standalone "1.12 – Daily Publish"
      # workflow (10:00 UTC, after this job), so a flaky Cecafe fetch no longer
      # blocks the daily deploy.

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
