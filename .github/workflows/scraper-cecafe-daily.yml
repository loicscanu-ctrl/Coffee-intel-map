name: "1.7 – Cecafe Daily Registration"

on:
  schedule:
    # Recurring failure pattern (May 2026): Cecafe's edge periodically
    # refuses GH Actions IPs for 30+ min windows. A single 09:00 UTC cron
    # whose 4 retries fit in ~25 min has been losing whole days. Three
    # spread-out attempts give the block time to clear naturally — same-day
    # IP throttles typically lift inside 2-3h.
    - cron: '0  9 * * *'   # 06:00 Brasília — primary attempt after overnight publish
    - cron: '0 13 * * *'   # 10:00 Brasília — midday backup if 09:00 was blocked
    - cron: '0 17 * * *'   # 14:00 Brasília — afternoon backup
  workflow_dispatch:

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 3 attempts × up to ~60s per request + 60s + 240s gaps ≈ 8 min worst
    # case. 15 leaves comfortable headroom for slow pip-installs / repo
    # checkout, well under the original 25min cap (which now lives across
    # 3 cron windows instead of one).
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # requests added — fetch_cecafe_daily switched from urllib.request
        # to requests for cleaner connect/read timeout separation. pdfplumber
        # stays for the PDF mirror fallback the parser can use.
        run: pip install pdfplumber requests

      - name: Run Cecafe scraper (3 attempts within this cron window)
        working-directory: backend
        # 3 attempts with exponential 60s/180s/360s spacing — total ~10 min
        # per cron run vs the old 4-at-5min = 20 min. The big resilience
        # win is now the *additional cron runs* at 13:00 and 17:00 UTC, not
        # within-run retries — same-day IP blocks usually clear in hours,
        # not minutes, so spacing retries 4h apart works where 5-min
        # spacing all hit the same block.
        run: |
          set +e
          for attempt in 1 2 3; do
            python -m scraper.fetch_cecafe_daily
            rc=$?
            [ $rc -eq 0 ] && exit 0
            if [ $attempt -lt 3 ]; then
              sleep_for=$((60 * attempt * attempt))   # 60, 240, ...
              echo "Attempt $attempt failed (rc=$rc); retrying in ${sleep_for}s..."
              sleep $sleep_for
            fi
          done
          echo "All 3 attempts failed within this cron window — next scheduled cron will retry."
          exit 1

      - name: Upload fetched page (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cecafe-daily-page
          path: debug/*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Validate output
        run: |
          python -c "
          import json, sys, subprocess
          sys.path.insert(0, 'backend')
          from scraper.validate_export import validate_cecafe_daily
          data = json.load(open('frontend/public/data/cecafe_daily.json'))
          ok, reason = validate_cecafe_daily(data)
          if not ok:
              print(f'[validate] cecafe_daily.json FAILED: {reason} — restoring HEAD version')
              subprocess.run(['git', 'checkout', '--', 'frontend/public/data/cecafe_daily.json'])
          "

      - name: Commit updated JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/cecafe_daily.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: cecafe daily registration $(date -u +%Y-%m-%d) [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      # Vercel redeploy is handled by the standalone "1.12 – Daily Publish"
      # workflow (10:00 UTC, after this job), so a flaky Cecafe fetch no longer
      # blocks the daily deploy.

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
