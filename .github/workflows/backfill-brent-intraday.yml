name: "9.5 – Backfill Brent Overnight Anchors (one-off)"

# Deep backfill for the open-direction model's brent_overnight candidate:
# per-contract Barchart 15-min bars → per-day 17:30-London / 03:00-UTC anchors
# from the max-volume (front) contract, roll-immune. Enables a REAL backtest
# of the feature before it can enter the model. See
# docs/research/open-price-direction-findings.md.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run Brent anchor backfill
        working-directory: backend
        run: python -m scraper.backfill_brent_intraday --from-year 2020 --to-year 2027

      - name: Commit backfilled anchors
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f data/brent_intraday_anchors.json ] && git add data/brent_intraday_anchors.json || true
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: Brent overnight anchor backfill [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
