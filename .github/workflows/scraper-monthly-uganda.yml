name: "3.3.5 – Monthly Scraper · Uganda UCDA Reports"

on:
  schedule:
    - cron: '0 2 14 * *'   # 14th of each month, 02:00 UTC (UCDA publishes mid-month)
  workflow_dispatch:

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      # UCDA fetches PDFs over plain HTTP (requests + pdfplumber) — no browser.
      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt python-dotenv

      - name: Run UCDA (Uganda) scraper (3 attempts)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_monthly ucda && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Commit parse-gap diagnostics if any
        run: |
          set -x
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p backend/scraper/cache/ucda_debug
          # cache/ is .gitignored; force-add diagnostics so the parser can be
          # hardened from the real layout of any report whose split failed.
          git add -f backend/scraper/cache/ucda_debug/*.txt 2>/dev/null || echo "  (no ucda_debug files)"
          if git diff --cached --quiet; then
            echo "No diagnostics to commit (all reports parsed cleanly)."
          else
            git commit -m "data: ucda parse-gap diagnostics [skip ci]"
            git pull --rebase --autostash --strategy-option=theirs origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
