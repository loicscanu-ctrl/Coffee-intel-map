name: Cecafe Export Scraper

on:
  schedule:
    # Run on the 15th of each month at 08:00 UTC
    # Cecafe typically publishes the previous month's report in the first 2 weeks
    - cron: '0 8 15 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl pdfplumber

      - name: Run Cecafe scraper
        run: python -m backend.scraper.fetch_cecafe

      - name: Commit updated JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/cecafe.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: update cecafe.json [skip ci]" && git pull --rebase --autostash origin main && git push)
