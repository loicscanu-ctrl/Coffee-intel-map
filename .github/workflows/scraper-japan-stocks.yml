name: "3.5 – AJCA (Japan)"

# Builds frontend/public/data/ajca.json from AJCA's monthly
# "コーヒー豆在庫実績調査" (j-zaiko) reports: green-coffee stocks by origin and
# by region/port, monthly. Runs on a GitHub runner because ajca.or.jp is
# reachable there (the Claude sandbox is host-allowlist blocked).

on:
  schedule:
    - cron: "0 5 6 * *"   # 6th of each month, 05:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: "Also write ajca_debug.json"
        type: boolean
        default: false

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  japan-stocks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt
      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Run Japan stocks backfill (3 attempts)
        working-directory: backend
        run: |
          run_scraper() {
            if [ "${{ inputs.debug }}" = "true" ]; then
              python -m scraper.backfill_japan_stocks --debug
            else
              python -m scraper.backfill_japan_stocks
            fi
          }
          for attempt in 1 2 3; do
            run_scraper && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Upload debug artifact
        if: ${{ inputs.debug }}
        uses: actions/upload-artifact@v4
        with:
          name: ajca-debug
          path: frontend/public/data/ajca_debug.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit japan_stocks.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f frontend/public/data/ajca_debug.json
          git add frontend/public/data/ajca.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: update ajca.json [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
