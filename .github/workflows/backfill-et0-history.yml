name: "0.6 – One-shot — Backfill ET₀ in weather history (Open-Meteo archive)"

# Why: the daily fetcher (1.10) requests ET₀ from Open-Meteo's *forecast*
# endpoint with past_days=92, but that endpoint silently truncates ET₀ to
# ~24 days back. The result: history files have months of rain/tmean/essm
# but only ~3 weeks of ET₀, which keeps SPEI gated out (target month needs
# near-complete ET₀, not just rain).
#
# This one-shot fills ET₀ into existing history records using the archive
# endpoint (the same source build_spei_baselines.py uses). Idempotent and
# safe to re-run: only writes ET₀ where it's missing.
#
# After this lands, the next 1.10 run will be able to gate SPEI on a fully
# populated prior month and the chips light up.
#
# NOT scheduled — workflow_dispatch only.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all (brazil colombia honduras indonesia uganda ethiopia vn)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill-et0:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill ET₀ — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS=""
          [ -n "$ORIGINS" ] && ARGS="--origins $ORIGINS"
          python backend/scripts/backfill_et0_history.py $ARGS

      - name: Overlay main's current history (so concurrent commits don't conflict)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          mkdir -p backend/seed/weather_history
          for f in $(git ls-tree -r origin/main --name-only | grep '^backend/seed/weather_history/.*\.json$'); do
            git show "origin/main:$f" > "$f" 2>/dev/null || true
          done

      - name: Backfill ET₀ — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
        run: |
          echo "=== APPLY — writing backend/seed/weather_history/*.json ==="
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/backfill_et0_history.py $ARGS

      - name: Commit refreshed history to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the filled files outside the git tree so checkout doesn't blow them away.
          mkdir -p "$RUNNER_TEMP/wh"
          cp backend/seed/weather_history/*.json "$RUNNER_TEMP/wh/"
          git checkout -- backend/seed/weather_history/ 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/wh"/*.json backend/seed/weather_history/
          git add backend/seed/weather_history/*.json
          if git diff --cached --quiet; then
            echo "No change to weather history — ET₀ already populated."
            exit 0
          fi
          git commit -m "data: backfill ET₀ in weather history (Open-Meteo archive) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit."
          else
            echo "ET₀ backfill committed. The next 1.10 (daily weather) run will start emitting SPEI per region."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
