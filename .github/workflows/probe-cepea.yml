name: "Z – Probe: CEPEA coffee scrape (test)"

# Diagnostic: reproduce the CEPEA/ESALQ coffee fetch in CI and report where it
# breaks (anti-bot block vs page-structure change) so we can fix brazil_arabica.
# No DB, no commits.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright playwright-stealth beautifulsoup4

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Probe CEPEA
        run: python backend/scraper/probe_cepea.py

      - name: Upload fetched bodies (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cepea-probe
          path: debug/cepea_probe/
          if-no-files-found: warn
          retention-days: 14
