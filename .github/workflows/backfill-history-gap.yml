name: "0.7 – One-shot — Backfill 2025 history gap (Open-Meteo archive)"

# Why: the SPEI 30-yr seed ends 2024-12-31 (build_spei_baselines.py) and the
# live weather history starts 2026-01-01 (fetch_origin_weather.py). All of
# 2025 is missing on both sides. SPEI-3 with target 2026-02 needs the
# contiguous 3-month window 2025-12 / 2026-01 / 2026-02, but rolling_sum
# rejects the non-contiguous span: it sees 2024-12 (seed end), gap, then
# 2026-01 (history start). Result: spei_1 emits, spei_3 doesn't.
#
# This one-shot pulls archive (rain + tmean + ET₀) for 2025-01-01..2025-12-31
# per region and injects the daily rows into weather history as new entries.
# After it lands, the merge has continuous data from 1995 through today and
# SPEI-3 starts emitting on the next 1.10 run.
#
# NOT scheduled — workflow_dispatch only. Idempotent: only writes dates that
# don't already exist in history.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all (brazil colombia honduras indonesia uganda ethiopia vn)"
        required: false
        default: ""
        type: string
      start:
        description: "Start date YYYY-MM-DD (default 2025-01-01)"
        required: false
        default: "2025-01-01"
        type: string
      end:
        description: "End date YYYY-MM-DD (default 2025-12-31)"
        required: false
        default: "2025-12-31"
        type: string
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill-history-gap:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill history gap — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
          START: ${{ inputs.start }}
          END: ${{ inputs.end }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS="--start $START --end $END"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/backfill_history_gap.py $ARGS

      - name: Overlay main's current history (so concurrent commits don't conflict)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          mkdir -p backend/seed/weather_history
          for f in $(git ls-tree -r origin/main --name-only | grep '^backend/seed/weather_history/.*\.json$'); do
            git show "origin/main:$f" > "$f" 2>/dev/null || true
          done

      - name: Backfill history gap — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
          START: ${{ inputs.start }}
          END: ${{ inputs.end }}
        run: |
          echo "=== APPLY — writing backend/seed/weather_history/*.json ==="
          ARGS="--write --start $START --end $END"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/backfill_history_gap.py $ARGS

      - name: Commit refreshed history to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/wh"
          cp backend/seed/weather_history/*.json "$RUNNER_TEMP/wh/"
          git checkout -- backend/seed/weather_history/ 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/wh"/*.json backend/seed/weather_history/
          git add backend/seed/weather_history/*.json
          if git diff --cached --quiet; then
            echo "No change to weather history — gap already filled."
            exit 0
          fi
          git commit -m "data: backfill 2025 history gap (Open-Meteo archive) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit."
          else
            echo "History-gap backfill committed. Next 1.10 (daily weather) run will start emitting spei_3 alongside spei_1."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
