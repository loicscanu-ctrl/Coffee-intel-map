name: "1.1 – Daily News Scraper"

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC daily
  workflow_dispatch:
  # Run automatically when scraper source code lands on main, so a fix
  # gets verified end-to-end without waiting for the next cron tick.
  push:
    branches: [main]
    paths:
      - 'backend/scraper/**'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests yfinance python-dotenv openpyxl

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Install Patchright (Python + Chromium)
        # Patchright is a Playwright fork that patches the runtime fingerprint
        # leaks Cloudflare uses to detect headless browsers. Used by vietnam.py
        # to get past giacaphe.com's CF JS challenge after stealth-rejection
        # was confirmed (see PR #36 / Apr 16 → May 14 2026 outage).
        #
        # We install it as an explicit step rather than relying on the
        # requirements.txt line because pip's resolver was silently dropping
        # patchright from the requirements install (likely a transitive
        # version conflict with playwright==1.44.0) — yielding a "No module
        # named patchright" failure two PRs in a row (#36, #38).
        # Explicit install surfaces any resolver conflict with a real error.
        run: |
          set -e
          echo "=== Before explicit install ==="
          pip show patchright 2>/dev/null || echo "  not installed by requirements.txt"
          echo "=== pip install patchright ==="
          pip install patchright
          echo "=== After install ==="
          pip show patchright
          echo "=== Installing chromium for patchright ==="
          python -m patchright install chromium

      - name: Run daily scraper (3 attempts)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for attempt in 1 2 3; do
            python -m scraper.run_daily && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
