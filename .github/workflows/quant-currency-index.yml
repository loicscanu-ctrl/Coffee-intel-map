name: "1.9 – Quant Coffee Currency Index"

on:
  schedule:
    # 21:30 UTC = 17:30 NY (after US markets close), Monday–Friday
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: data-commit          # serialize all main-pushers
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: backend/scraper/requirements.txt

      - name: Install dependencies
        # yfinance/curl_cffi dropped: fetch_currency_index uses jsDelivr and
        # robusta_factors now pulls DXY from Stooq (dx.f), so nothing in the
        # quant model talks to Yahoo anymore — which is what kept blocking on
        # GitHub Actions IPs. python-dotenv is needed by backend/database.py,
        # which run_quant.py imports.
        run: pip install requests pandas numpy sqlalchemy psycopg2-binary google-generativeai python-dotenv

      - name: Run Currency Index scraper (3 attempts)
        id: fetch_cci
        # 5-minute backoff matches the repo-wide retry standard (PR #302).
        # The historical 15-minute window was added when fetch_currency_index
        # talked to yfinance and needed Yahoo's per-IP rate limit to clear;
        # PR #54 migrated to jsDelivr (CDN-cached static file, no rate limit)
        # so the wider backoff is no longer justified.
        run: |
          for attempt in 1 2 3; do
            python -m backend.scraper.quant_model.fetch_currency_index && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Validate CCI output
        # Validate immediately after fetch so a bad CCI doesn't get committed
        # below. The validator only checks the currency_index section — it
        # doesn't require Robusta/sentiment fields, which is exactly why we
        # can commit here BEFORE the (often flaky) Robusta step.
        run: |
          python -c "
          import json, sys, subprocess
          sys.path.insert(0, 'backend')
          from scraper.validate_export import validate_quant_report
          data = json.load(open('frontend/public/data/quant_report.json'))
          ok, reason = validate_quant_report(data)
          if not ok:
              print(f'[validate] quant_report.json FAILED: {reason} — restoring HEAD version')
              subprocess.run(['git', 'checkout', '--', 'frontend/public/data/quant_report.json'])
              sys.exit(1)
          "

      - name: Commit CCI + fx_history (before Robusta)
        # Decoupled from the Robusta step. PR #54 migrated fetch_currency_index
        # to jsDelivr (works), but robusta_factors.py still uses yfinance
        # (intermittently blocked on GH Actions IPs). Previously, a yfinance
        # failure aborted the whole workflow before this commit step, and
        # the daily CCI update never landed in the repo — quant_report.json
        # stuck on 2026-05-08 for 9+ days before the freshness check 1.5
        # caught it, and fx_history.json was never committed at all.
        # Committing here means CCI + fx_history update daily regardless of
        # what Robusta does downstream.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/quant_report.json
          [ -f frontend/public/data/fx_history.json ] && git add frontend/public/data/fx_history.json || true
          git diff --cached --quiet \
            && echo "No CCI changes." \
            || (git commit -m "data: update CCI + fx_history [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      - name: Run Sentiment + Robusta Factor model (3 attempts)
        id: run_quant
        # continue-on-error so a Robusta failure (yfinance blocked on GH IPs)
        # doesn't strand the CCI commit above. The freshness check workflow
        # 1.5 still catches a persistently-failing run_quant via its own
        # threshold on whatever output run_quant produces.
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for attempt in 1 2 3; do
            python -m backend.scraper.quant_model.run_quant && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 5m..." && sleep 300 || exit 1
          done

      - name: Commit Robusta additions (only if Robusta succeeded)
        if: steps.run_quant.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/quant_report.json
          git diff --cached --quiet \
            && echo "No Robusta changes." \
            || (git commit -m "data: update Robusta factors [skip ci]" && git pull --rebase --autostash --strategy-option=theirs origin main && git push)

      - name: Notify on Robusta-only failure
        # Separate from the workflow failure path below. Robusta failure no
        # longer blocks CCI commits, but we still want a Telegram heads-up
        # so we know it's been failing for a while.
        if: steps.run_quant.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⚠ ${{ github.workflow }} — Robusta step failed (CCI + fx_history still committed) — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
