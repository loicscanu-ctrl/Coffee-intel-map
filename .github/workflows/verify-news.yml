name: "Z – Verify: NA coffee news (temp)"

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install beautifulsoup4 requests
      - name: Scrape coffee news
        working-directory: backend
        run: python -m scraper.sources.noticias_cafe
