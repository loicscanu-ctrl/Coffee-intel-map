name: "0.2 – One-shot — Relabel COT contracts to FND-based front-month"

# One-time cleanup of the misalignment introduced by the Stooq backfill:
# max-OI labels were attached to continuous-front-month prices. This
# workflow rewrites every price_contract_{ny,ldn} to the front-month-by-FND
# contract, matching the prices already stored. The contract each price
# actually belongs to was confirmed by manual exchange verification — the
# relabel reproduces that mapping exactly (validated on 29 sample dates).
#
# Also corrects the lone RMN26 (Barchart RM-root) label on the latest row
# to RCN26, since _front_month emits the RC convention.
#
# Re-runnable, idempotent. Original state preserved in cot_weekly_price_archive.

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "Look-back window in weeks (520 = 10y; covers full backfill)"
        required: true
        default: "520"
        type: string
      dry_run:
        description: "Dry-run only (no DB writes). Default false = apply."
        required: false
        default: false
        type: boolean
  # Sentinel push trigger — lets Claude fire this from a chat session while
  # the user is off-laptop. Touching either file runs the workflow; the
  # Telegram summary lands on the user's phone.
  push:
    paths:
      - '.github/triggers/relabel-dryrun.txt'
      - '.github/triggers/relabel-apply.txt'

jobs:
  relabel:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r scraper/requirements.txt pandas requests python-dotenv openpyxl

      - name: Install frontend dependencies (for signals export)
        working-directory: frontend
        run: npm ci

      - name: Resolve run mode
        id: mode
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then echo "mode=dry-run" >> $GITHUB_OUTPUT; else echo "mode=apply" >> $GITHUB_OUTPUT; fi
            echo "weeks=${{ inputs.weeks }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git log -1 --name-only --pretty=format: | tr -d ' ' | grep -E 'relabel-(dryrun|apply)\.txt' | head -1 || true)
            if echo "$CHANGED" | grep -q "relabel-apply.txt"; then echo "mode=apply" >> $GITHUB_OUTPUT; else echo "mode=dry-run" >> $GITHUB_OUTPUT; fi
            echo "weeks=520" >> $GITHUB_OUTPUT
          fi

      - name: Relabel — DRY RUN
        if: steps.mode.outputs.mode == 'dry-run'
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          echo "=== DRY RUN — no DB writes ==="
          python scripts/relabel_contracts_to_frontmonth.py --weeks ${{ steps.mode.outputs.weeks }} 2>&1 | tee /tmp/relabel_output.txt

      - name: Relabel — APPLY
        if: steps.mode.outputs.mode == 'apply'
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          python scripts/relabel_contracts_to_frontmonth.py --apply --weeks ${{ steps.mode.outputs.weeks }} 2>&1 | tee /tmp/relabel_output.txt

      - name: Re-export static JSON (cot.json reflects new labels)
        if: steps.mode.outputs.mode == 'apply'
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.export_static_json

      - name: Refresh signals.json (engine sees updated labels)
        if: steps.mode.outputs.mode == 'apply'
        working-directory: frontend
        run: npm run export:signals

      - name: Commit regenerated static JSON
        if: steps.mode.outputs.mode == 'apply'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            frontend/public/data/cot.json \
            frontend/public/data/cot_recent.json \
            frontend/public/data/signals.json
          if git diff --cached --quiet; then
            echo "No JSON changes after relabel."
            exit 0
          fi
          git commit -m "data: relabel COT contracts to FND-based front-month [skip ci]"
          git pull --rebase --autostash --strategy-option=theirs origin main
          git push

      - name: Telegram summary (always)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ steps.mode.outputs.mode }}
          WEEKS: ${{ steps.mode.outputs.weeks }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          ICON="DRY"; [ "$MODE" = "apply" ] && ICON="APPLY"; [ "$JOB_STATUS" = "failure" ] && ICON="FAIL"
          HEAD=$(head -8 /tmp/relabel_output.txt 2>/dev/null || echo "")
          TAIL=$(tail -40 /tmp/relabel_output.txt 2>/dev/null || echo "(no output)")
          {
            printf '%s relabel FND-front-month (%s, %sw)\n' "$ICON" "$MODE" "$WEEKS"
            printf 'status: %s\n' "$JOB_STATUS"
            printf 'run: %s\n\n' "$RUN_URL"
            printf -- '--- head ---\n%s\n--- tail ---\n%s\n' "$HEAD" "$TAIL"
          } | head -c 3800 > /tmp/tg_msg.txt
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@/tmp/tg_msg.txt" >/dev/null
          echo "Sent Telegram summary."
