name: "Z – Probe: NA B3 + news (test)"

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install beautifulsoup4
      - name: Probe
        run: python backend/scraper/probe_na.py
