name: "0.7 – Weekly — ENSO indices (Niño 3.4 SST + SOI · NOAA CPC)"

# Fetches the two trader-relevant ENSO atmosphere/ocean indices that
# the headline ONI history doesn't carry:
#   • Niño 3.4 weekly SST anomaly  — leads ONI by ~6 weeks
#   • SOI monthly standardized     — the atmospheric pressure side
# Together they let the dashboard show the ocean-atmosphere COUPLE,
# not just the SST half ONI captures.
#
# WHY a workflow: NOAA CPC (www.cpc.ncep.noaa.gov) is NOT on the Claude
# Code sandbox egress allowlist (403), but GitHub runners have open
# egress — same pattern as the ONI history seed builder. The files are
# refreshed weekly (Niño 3.4 on Mondays, SOI mid-month), so the cron
# fires every Tuesday morning UTC after both have updated.
#
# Both endpoints serve the FULL history every request (KB-scale text),
# so the same code path covers both the historical seed and the
# weekly refresh. The `mode` workflow input is operator intent only —
# 'backfill' logs prominently, 'refresh' logs quietly.

on:
  schedule:
    - cron: '30 6 * * 2'    # Tuesday 06:30 UTC — after both NOAA files refresh
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode — backfill (seed) or refresh (incremental). Functionally identical for these endpoints."
        required: false
        default: refresh
        type: choice
        options:
          - refresh
          - backfill
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean
      diag:
        description: "Dump head/tail of fetched NOAA text to the log (debug format drift)."
        required: false
        default: false
        type: boolean

jobs:
  fetch-enso-indices:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ENSO indices (3 retry attempts)
        id: fetch
        env:
          MODE: ${{ inputs.mode || 'refresh' }}
          DRY_RUN: ${{ inputs.dry_run }}
          DIAG: ${{ inputs.diag }}
        run: |
          set -e
          if [ "$DRY_RUN" = "true" ]; then
            ARGS=""    # no --write
          else
            ARGS="--write"
          fi
          if [ "$MODE" = "backfill" ]; then
            ARGS="$ARGS --backfill"
          fi
          if [ "$DIAG" = "true" ]; then
            ARGS="$ARGS --diag"
          fi
          cd backend
          for attempt in 1 2 3; do
            PYTHONPATH=. python -m scraper.sources.enso_indices $ARGS && break
            if [ $attempt -lt 3 ]; then
              echo "[enso] attempt $attempt failed — retrying in 5m..."
              sleep 300
            else
              echo "[enso] all 3 attempts failed — leaving JSON untouched"
              exit 1
            fi
          done

      - name: Commit updated enso_indices.json if changed
        if: ${{ inputs.dry_run != true }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f frontend/public/data/enso_indices.json ]; then
            echo "No enso_indices.json produced — nothing to commit."
            exit 0
          fi
          git add frontend/public/data/enso_indices.json
          if git diff --cached --quiet; then
            echo "No ENSO indices change."
            exit 0
          fi
          git commit -m "data: ENSO indices refresh $(date -u +%Y-%m-%d) [skip ci]"
          ok=0
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash --strategy-option=theirs origin main && git push origin main; then ok=1; break; fi
            echo "push attempt $attempt failed (concurrent push?); retrying in $((5*attempt))s…"; sleep $((5 * attempt))
          done
          [ "$ok" = 1 ] || { echo "push failed after 5 attempts"; exit 1; }

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed (NOAA CPC likely unreachable) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
