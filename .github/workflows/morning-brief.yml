name: "1.6 – Morning Brief"

on:
  schedule:
    # 03:09 UTC ≈ 10:09 Vietnam time (UTC+7). Primary delivery target.
    # Upstream chain ends well before this:
    #   01:07 UTC  scraper-daily       (~30-50 min)
    #   02:13 UTC  daily_oi            (~3 min, weekdays)
    #   02:19 UTC  scraper-freight     (~5 min)
    #   02:41 UTC  export-and-publish  (~10 min)
    # → all done by ~02:55 UTC, leaving ~15 min headroom before 10am VN.
    # All five workflows use off-:00/:30 minutes (7, 13, 19, 41, 9) to dodge
    # GH Actions' well-known cron skip on top-of-hour and :30 marks. Before
    # this change, scraper-daily was firing 4-5h late (~05:30 UTC), so the
    # 03:00 brief read 24h-stale JSONs from yesterday's run.
    - cron: '9 3 * * *'
  workflow_run:
    # Safety net for skipped scheduled runs. GH Actions cron has a known
    # skip rate during peak load (esp. :00/:30 minute slots) — empirically
    # observed 2026-05-15: 01:30 UTC export-and-publish skipped, didn't bot-commit
    # until 04:58 UTC; the 02:30 UTC brief never fired and no failure alert
    # was sent (because it never started, so the on-failure step couldn't run).
    #
    # When export-and-publish completes successfully, this workflow ALSO fires.
    # A guard step inside the job ensures the brief only sends once per UTC day:
    # if today's brief already went out (via cron or earlier workflow_run), the
    # job exits silently. So this is purely additive — never causes a double-send.
    workflows: ["1.4 – Export and Publish Static JSON"]
    types: [completed]
  workflow_dispatch:        # manual trigger from GitHub UI

# Force serialization across all triggers — prevents two concurrent runs racing
# on the once-per-day idempotency check below.
concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  # Lightweight dedup gate — no checkout, no setup. Export-and-Publish itself
  # fires from three upstream workflows (scraper-daily, COT, daily-OI), so on
  # a busy data morning this workflow's workflow_run trigger can fire 2-3x in
  # quick succession. Running the gate as a standalone job means the duplicate
  # fires exit in ~5 s instead of ~15-20 s (the previous shape paid for
  # actions/checkout@v4 inside the main job before the guard could short-circuit).
  guard:
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      skip: ${{ steps.dedupe.outputs.skip }}
    steps:
      - name: Idempotency guard — skip if brief already sent today
        id: dedupe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          THIS_RUN: ${{ github.run_id }}
          EVENT:    ${{ github.event_name }}
        run: |
          # workflow_dispatch is an explicit human action — always bypass the
          # guard. The guard exists to prevent the cron+workflow_run double-
          # trigger from double-sending, not to block manual re-fires.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — bypassing idempotency guard."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          export today THIS_RUN
          prior=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/morning-brief.yml/runs?status=success&per_page=20" \
            | python3 -c "
          import json, sys, os
          d = json.load(sys.stdin)
          today    = os.environ['today']
          this_run = os.environ['THIS_RUN']
          for r in d.get('workflow_runs', []):
              if str(r['id']) == this_run:
                  continue
              if r.get('updated_at', '').startswith(today):
                  print(r['id']); break
          ")
          if [ -n "$prior" ]; then
            echo "Brief already sent today via run $prior — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No prior successful run today. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  brief:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # The brief reads published static JSON + posts to Telegram — it needs
        # only `requests`, NOT the full scraper stack (playwright/scipy/yfinance/
        # curl_cffi/…). Installing the whole requirements file is what made this
        # job slow; the minimal install drops it from minutes to seconds.
        run: pip install requests

      - name: Send morning brief
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scraper.morning_brief

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=Morning brief failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
