name: "1.6 – Morning Brief"

on:
  schedule:
    # 03:41 UTC ≈ 10:41 Vietnam time (UTC+7) — FALLBACK only. The primary
    # trigger is now the workflow_run chain on "1.16 – Open-Direction
    # Prediction Log" (03:00 UTC weekdays): the brief includes that job's
    # pre-open RC call, so it must fire AFTER it. On the normal path the log
    # completes ~03:05–03:20 and chains the brief immediately; this cron only
    # matters on weekends (no 1.16 run) or when the 03:00 cron was skipped.
    # Upstream data chain ends well before either path:
    #   01:07 UTC  scraper-daily       (~30-50 min)
    #   02:13 UTC  daily_oi            (~3 min, weekdays)
    #   02:19 UTC  scraper-freight     (~5 min)
    #   02:41 UTC  export-and-publish  (~10 min)
    #   03:00 UTC  open-direction log  (~5-10 min, weekdays)
    # Off-:00/:30 minutes dodge GH Actions' cron skip on round marks.
    - cron: '41 3 * * *'
  workflow_run:
    # Two chained triggers, one dedup guard (once per UTC day):
    #  * 1.16 Open-Direction Prediction Log — the PRIMARY morning path; firing
    #    right after it guarantees the fresh pre-open RC call is in the brief.
    #  * 1.4 Export and Publish — safety net for skipped scheduled runs.
    #    GH Actions cron has a known skip rate during peak load; empirically
    #    observed 2026-05-15 (export skipped, brief never fired, no alert).
    # The in-job guard ensures the brief only sends once per UTC day, so the
    # multiple triggers are purely additive — never a double-send.
    workflows: ["1.16 – Open-Direction Prediction Log", "1.4 – Export and Publish Static JSON"]
    types: [completed]
  workflow_dispatch:        # manual trigger from GitHub UI

# Force serialization across all triggers — prevents two concurrent runs racing
# on the once-per-day idempotency check below.
concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  # Lightweight dedup gate — no checkout, no setup. Export-and-Publish itself
  # fires from three upstream workflows (scraper-daily, COT, daily-OI), so on
  # a busy data morning this workflow's workflow_run trigger can fire 2-3x in
  # quick succession. Running the gate as a standalone job means the duplicate
  # fires exit in ~5 s instead of ~15-20 s (the previous shape paid for
  # actions/checkout@v4 inside the main job before the guard could short-circuit).
  guard:
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      skip: ${{ steps.dedupe.outputs.skip }}
    steps:
      - name: Idempotency guard — skip if brief already sent today
        id: dedupe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          THIS_RUN: ${{ github.run_id }}
          EVENT:    ${{ github.event_name }}
        run: |
          # workflow_dispatch is an explicit human action — always bypass the
          # guard. The guard exists to prevent the cron+workflow_run double-
          # trigger from double-sending, not to block manual re-fires.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — bypassing idempotency guard."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          export today THIS_RUN
          prior=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/morning-brief.yml/runs?status=success&per_page=20" \
            | python3 -c "
          import json, sys, os
          d = json.load(sys.stdin)
          today    = os.environ['today']
          this_run = os.environ['THIS_RUN']
          for r in d.get('workflow_runs', []):
              if str(r['id']) == this_run:
                  continue
              if r.get('updated_at', '').startswith(today):
                  print(r['id']); break
          ")
          if [ -n "$prior" ]; then
            echo "Brief already sent today via run $prior — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No prior successful run today. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  brief:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # The brief reads published static JSON + posts to Telegram — it needs
        # only `requests`, NOT the full scraper stack (playwright/scipy/yfinance/
        # curl_cffi/…). Installing the whole requirements file is what made this
        # job slow; the minimal install drops it from minutes to seconds.
        run: pip install requests

      - name: Send morning brief
        id: send
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        # Exit 75 = the freshness gate skipped (data not yet the latest session,
        # or outside the morning window). We surface it as a job FAILURE so the
        # idempotency guard doesn't record this run as a delivered brief — a
        # later trigger (once the pipeline lands fresh data) sends it — but we
        # suppress the Telegram failure alert for it (it's not a real failure).
        run: |
          set +e
          python -m scraper.morning_brief
          rc=$?
          if [ "$rc" -eq 75 ]; then
            echo "Brief gate skipped (not yet fresh / outside window) — will deliver on a later trigger."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          exit $rc

      - name: Notify on failure
        if: failure() && steps.send.outputs.skipped != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=Morning brief failed — $(date -u +'%Y-%m-%d %H:%M UTC') — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
