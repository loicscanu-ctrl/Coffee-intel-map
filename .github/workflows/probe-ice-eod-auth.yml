name: "Z – Probe: ICE EOD Report 12 (auth replay)"

# Auth-replay variant. Reads cookies from secrets.ICE_COOKIES (set in
# repo settings) and replays the user's browser request from a GH runner.
# Fires automatically on push so we don't depend on workflow_dispatch
# being registered on main.

on:
  workflow_dispatch:
  push:
    branches: [claude/probe-ice-eod]
    paths:
      - 'backend/scraper/probe_ice_eod_auth.py'
      - '.github/workflows/probe-ice-eod-auth.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Probe ICE Report 12 EOD (auth replay)
        env:
          ICE_COOKIES: ${{ secrets.ICE_COOKIES }}
        run: python backend/scraper/probe_ice_eod_auth.py
        continue-on-error: true

      - name: Upload PDFs / error bodies
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ice-eod-auth-probe
          path: debug/ice_probe_eod/
          if-no-files-found: warn
          retention-days: 7
