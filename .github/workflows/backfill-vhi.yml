name: "0.10 – One-shot — Backfill VHI long-form history (NOAA STAR)"

# Why: the rolling weekly cron (0.5) only stores 3 years of VHI per province
# (enough for the freshness chip + the trailing chart). For the weather-analog
# forecast we need a 30Y per-stage VHI signature so the engine can z-score
# the current cycle's vegetation health against the historical population.
#
# This one-shot re-pulls every province from NOAA STAR's admin-1 endpoint
# with --years 30, which (for years ≥ LONG_FORM_THRESHOLD_YEARS) also writes
# a `weekly_history` array per province alongside the existing vhi_recent /
# vhi_latest fields. compute_weather_analogs.py reads weekly_history and
# adds vhi_mean per phenology stage as the 7th signature dimension.
#
# Volume: 34 provinces × ~1500 weeks ≈ 50k records. Each NOAA request is one
# province × full year range → 34 calls total. ~5 min wall-clock.
#
# NOT scheduled — workflow_dispatch only. Idempotent (overwrites the file).

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys (blank = all 7)"
        required: false
        default: ""
        type: string
      years:
        description: "Years of trailing history (default 30 to match the weather backfill window)"
        required: false
        default: "30"
        type: string

jobs:
  backfill-vhi:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill VHI long-form
        env:
          ORIGINS: ${{ inputs.origins }}
          YEARS:   ${{ inputs.years }}
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS="--write --years $YEARS"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          python backend/scripts/fetch_vhi.py $ARGS

      - name: Commit refreshed VHI to main
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/vhi_*.json
          if git diff --cached --quiet; then
            echo "No change to VHI files."
            exit 0
          fi
          git commit -m "data: backfill VHI long-form history (${{ inputs.years }}y) [skip ci]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Summary
        if: always()
        run: |
          echo "After commit: dispatch '1.10 – Daily Weather Fetch & Accumulate' so"
          echo "compute_weather_analogs.py picks up the freshly-shipped weekly_history"
          echo "and emits VHI per stage in each weather_analogs_*.json."

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
