name: "9.4 – Backfill Deep COT History (one-off)"

# One-off deep-history backfill for the COT×harvest multi-day model track:
# ICE Robusta COT weekly rows from the COTHist{year} CSVs (2011→2021, merged
# with the shipped cot.json ldn series) + long daily continuous RM*1/KC*1
# settles from Barchart. See docs/research/open-price-direction-findings.md.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run deep backfill
        working-directory: backend
        run: python -m scraper.backfill_cot_deep

      - name: Commit backfilled history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in data/ice_cot_robusta_history.json data/rc_daily_continuous.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: deep COT + continuous-price backfill [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
