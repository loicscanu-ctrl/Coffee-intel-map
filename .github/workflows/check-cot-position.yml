name: Check cot_position dual-write

# One-shot diagnostic: connects to the production DB and reports whether
# cot_position exists, how many rows it holds, and whether the latest
# wide-table data matches the narrow-table data.
#
# Auto-runs on push to this file so the answer lands in the run log
# without requiring a manual click. Also exposes workflow_dispatch.

on:
  push:
    paths:
      - '.github/workflows/check-cot-position.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet psycopg2-binary

      - name: Query cot_position
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os, psycopg2

          if not os.environ.get("DATABASE_URL"):
              print("::error::DATABASE_URL secret not configured")
              raise SystemExit(1)

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur  = conn.cursor()

          # 1. Does the table exist yet?
          cur.execute("""
              SELECT EXISTS (
                  SELECT FROM information_schema.tables
                  WHERE table_name = 'cot_position'
              )
          """)
          exists = cur.fetchone()[0]
          print(f"\n========== cot_position table ==========")
          print(f"exists in production: {exists}")
          if not exists:
              print("\nThe table will be created on the next run of:")
              print("  - Daily News Scraper (scraper-daily.yml)")
              print("  - COT Scraper (scraper-cot.yml)")
              print("  - Tuesday Prices Scraper (scraper-tuesday-prices.yml)")
              print("Until then, dual-write is silently skipped (logged) and")
              print("the wide cot_weekly table remains the source of truth.")
              raise SystemExit(0)

          # 2. Row count + date range
          cur.execute("SELECT COUNT(*), MIN(date), MAX(date) FROM cot_position")
          count, min_date, max_date = cur.fetchone()
          print(f"row count:    {count:,}")
          print(f"date range:   {min_date} → {max_date}")

          if count == 0:
              print("\n::warning::Table exists but is empty. The dual-write hasn't")
              print("populated any rows yet — the next scraper run should fill it.")
              raise SystemExit(0)

          # 3. Latest 20 rows
          cur.execute("""
              SELECT date, market, crop, category, side, oi, traders
              FROM cot_position
              ORDER BY date DESC, market, crop, category, side
              LIMIT 20
          """)
          print(f"\n========== latest 20 rows ==========")
          print(f"  {'date':<12} {'mkt':<4} {'crop':<6} {'cat':<7} {'side':<7} {'oi':>10} {'traders':>8}")
          for date, mkt, crop, cat, side, oi, traders in cur.fetchall():
              oi_s      = f"{oi:,}"      if oi      is not None else "—"
              traders_s = f"{traders}"   if traders is not None else "—"
              print(f"  {str(date):<12} {mkt:<4} {crop:<6} {cat:<7} {side:<7} {oi_s:>10} {traders_s:>8}")

          # 4. Sanity check: wide vs narrow agreement for latest week, both markets
          cur.execute("""
              SELECT date, market,
                     mm_long, mm_short, mm_spread,
                     pmpu_long, pmpu_short,
                     swap_long, swap_short, swap_spread
              FROM cot_weekly
              ORDER BY date DESC, market
              LIMIT 4
          """)
          print(f"\n========== wide ⇆ narrow agreement check ==========")
          all_match = True
          for row in cur.fetchall():
              date, market = row[0], row[1]
              wide = {
                  "mm_long":   row[2], "mm_short":  row[3], "mm_spread":  row[4],
                  "pmpu_long": row[5], "pmpu_short": row[6],
                  "swap_long": row[7], "swap_short": row[8], "swap_spread": row[9],
              }
              cur2 = conn.cursor()
              cur2.execute("""
                  SELECT category, side, oi FROM cot_position
                  WHERE date=%s AND market=%s AND crop='all'
                    AND category IN ('mm','pmpu','swap')
              """, (date, market))
              narrow = {f"{cat}_{side}": oi for cat, side, oi in cur2.fetchall()}
              cur2.close()

              # Compare keys present in BOTH (some wide values may legitimately be NULL)
              shared = set(wide) & set(narrow)
              mismatches = [k for k in shared if wide[k] != narrow[k]]
              status = "✓ match" if not mismatches else f"✗ mismatch on {mismatches}"
              if mismatches:
                  all_match = False
              print(f"  {date} {market}: {len(shared)} fields compared — {status}")
              if mismatches:
                  for k in mismatches:
                      print(f"      {k}: wide={wide[k]} narrow={narrow.get(k)}")

          print()
          if not all_match:
              print("::error::Wide / narrow values diverge — investigate before backfill (PR B).")
              raise SystemExit(2)
          print("✓ Dual-write looks healthy. Safe to proceed with PR B (backfill).")
          cur.close()
          conn.close()
          PY
