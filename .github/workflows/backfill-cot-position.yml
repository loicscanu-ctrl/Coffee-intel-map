name: Backfill cot_position

# One-shot migration: walks every existing cot_weekly row and emits the
# matching cot_position rows. Idempotent — safe to re-run; existing rows
# get updated in place rather than duplicated.
#
# Manual trigger only. Run once after PR B merges:
#   Actions → "Backfill cot_position" → Run workflow → main
# A dry-run option lets you preview what would change without writing.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report only, no writes"
        type: boolean
        required: false
        default: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet sqlalchemy psycopg2-binary python-dotenv

      - name: Run backfill
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python backfill_cot_position.py --dry-run
          else
            python backfill_cot_position.py
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then exit 0; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 cot_position backfill failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null || true
