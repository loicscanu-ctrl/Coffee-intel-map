name: "1.96 – Fetch Intraday KC/RC 15min (Barchart)"

# Gathers the 15-min intraday points the open-direction feature needs for both
# robusta (RM) and arabica (KC) from Barchart, plus archive settles. Scoped to
# a ~1-month window first for validation (maxrecords default 2000). See
# backend/scraper/fetch_intraday_kc_rc.py. workflow_dispatch only for now.

on:
  workflow_dispatch:
    inputs:
      maxrecords:
        description: "Bars per contract (2000 ≈ 1.5 months at 15m; 5000 ≈ full ~9 months)"
        required: false
        default: "2000"
        type: string

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps + chromium
        run: |
          pip install --quiet playwright
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          playwright install chromium --with-deps || playwright install chromium
      - name: Fetch 15-min intraday
        working-directory: backend
        run: python -m scraper.fetch_intraday_kc_rc --maxrecords "${{ inputs.maxrecords }}"
      - name: Commit intraday history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/intraday_kc_rc_15min.json
          git diff --cached --quiet \
            && echo "No change." \
            || (git commit -m "data: intraday KC/RC 15min (Barchart) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
