name: "0.6 – One-shot — Backfill missing weather-history fields (Open-Meteo archive)"

# Generalization of the original "backfill ET₀" workflow. The daily fetcher
# (1.10) sometimes stores `None` for a field because Open-Meteo's *forecast*
# endpoint silently returned null. Known cases:
#   - ET₀: forecast truncates to ~24 days back even with past_days=92.
#   - Rain: forecast returned null for 2026-03..2026-04 across every region
#     (61 days), plus 2026-01 for 4 of 5 Vietnam regions (extra 31).
#
# The archive endpoint usually has the values. This one-shot heals any
# requested field where it's None in existing history rows. Field-generic
# so future API-null recurrences are a single re-dispatch.
#
# NOT scheduled — workflow_dispatch only. Idempotent.

on:
  workflow_dispatch:
    inputs:
      origins:
        description: "Space-separated origin keys, or blank for all"
        required: false
        default: ""
        type: string
      fields:
        description: "Space-separated fields to heal (rain et0 tmean); blank = all three"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Preview only (no commit). Default false = apply."
        required: false
        default: false
        type: boolean

jobs:
  backfill-missing-fields:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill missing fields — DRY RUN (preview only)
        if: ${{ inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
          FIELDS:  ${{ inputs.fields }}
        run: |
          echo "=== DRY RUN — no --write, no commit ==="
          ARGS=""
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          [ -n "$FIELDS" ]  && ARGS="$ARGS --fields  $FIELDS"
          python backend/scripts/backfill_missing_fields.py $ARGS

      - name: Overlay main's current history (so concurrent commits don't conflict)
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          mkdir -p backend/seed/weather_history
          for f in $(git ls-tree -r origin/main --name-only | grep '^backend/seed/weather_history/.*\.json$'); do
            git show "origin/main:$f" > "$f" 2>/dev/null || true
          done

      - name: Backfill missing fields — APPLY
        if: ${{ !inputs.dry_run }}
        env:
          ORIGINS: ${{ inputs.origins }}
          FIELDS:  ${{ inputs.fields }}
        run: |
          echo "=== APPLY — writing backend/seed/weather_history/*.json ==="
          ARGS="--write"
          [ -n "$ORIGINS" ] && ARGS="$ARGS --origins $ORIGINS"
          [ -n "$FIELDS" ]  && ARGS="$ARGS --fields  $FIELDS"
          python backend/scripts/backfill_missing_fields.py $ARGS

      - name: Commit refreshed history to main
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p "$RUNNER_TEMP/wh"
          cp backend/seed/weather_history/*.json "$RUNNER_TEMP/wh/"
          git checkout -- backend/seed/weather_history/ 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/wh"/*.json backend/seed/weather_history/
          git add backend/seed/weather_history/*.json
          if git diff --cached --quiet; then
            echo "No change to weather history — all requested fields already populated."
            exit 0
          fi
          git commit -m "data: backfill missing weather-history fields (Open-Meteo archive) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "Dry-run complete. Re-run with dry_run=false to commit."
          else
            echo "Missing-field backfill committed. Next 1.10 run will start emitting any newly-unblocked SPEI/SPI windows."
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
