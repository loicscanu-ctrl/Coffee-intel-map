name: "z – Probe Barchart Intraday (throwaway)"

# One-off: can we get ROBUSTA 15-min intraday history from Barchart? Reuses the
# Playwright + XSRF session pattern the OI scraper uses, tries Barchart's
# historical intraday endpoints for RMU26/KCU26, and commits a summary to
# frontend/public/data/_probe_barchart.json for inspection. Delete after.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps + chromium
        run: |
          pip install --quiet playwright
          playwright install chromium --with-deps
      - name: Run Barchart intraday probe
        working-directory: backend
        run: python -m scraper.probe_barchart_intraday
      - name: Commit probe output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/_probe_barchart.json
          git diff --cached --quiet \
            && echo "No probe output." \
            || (git commit -m "probe: barchart intraday result [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin "${GITHUB_REF_NAME}" \
                && git push origin HEAD:"${GITHUB_REF_NAME}")
