name: "9.7 – Backfill cross-commodity crop-year X-ray (one-off)"

# One-off deep backfill for the cross-commodity crop-year X-ray: downloads the
# CFTC disaggregated archives (hist 2006-2016 + yearly) and builds
# cropyear_xray.json for all seven old/other crop-year markets (coffee, cocoa,
# sugar, cotton, wheat, corn, soybeans). Append-once per market-year — after
# one successful run the nightly export only refreshes current cycles.
# Stdlib-only; no DB.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run crop-year X-ray backfill (stdlib only)
        working-directory: backend
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scraper.exporters.cot_cropyear_xray import export_cot_cropyear_xray
          export_cot_cropyear_xray()
          "

      - name: Commit backfilled history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/cropyear_xray.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "data: cross-commodity crop-year X-ray backfill (2006+) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
