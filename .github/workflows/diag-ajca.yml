name: "Z – AJCA structure probe (diagnostic)"

# One-off: inspects what AJCA publishes (stocks? by type? by origin? monthly?)
# from a runner where AJCA is reachable. Output is in the run log only.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests pdfplumber
      - name: Probe AJCA
        working-directory: backend
        run: python -m scraper.diag_ajca
