name: "1.99 – Backfill FX history (CCI, Yahoo, 2020+)"

# One-shot DEEP backfill of fx_history.json (the per-pair FX closes behind the
# Coffee Currency Index) back to 2020 via Yahoo's chart API, so the
# open-direction model's CCI features have multi-year depth. The daily CCI job
# (fetch_currency_index) then merges recent days on top without truncating.
# See backend/scraper/quant_model/backfill_fx_history.py. workflow_dispatch only.

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Backfill start date (YYYY-MM-DD)"
        required: false
        default: "2020-01-01"
        type: string

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet requests pandas
      - name: Backfill FX history (Yahoo, 2020+)
        working-directory: backend
        run: python -m scraper.quant_model.backfill_fx_history --since "${{ inputs.since }}"
      - name: Commit fx_history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/fx_history.json
          git diff --cached --quiet \
            && echo "No change." \
            || (git commit -m "data: deep-backfill fx_history (CCI) to 2020 [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
