name: "Z – Probe: Brazil Arabica físico (test)"

# Diagnostic: confirm the noticiasagricolas "Café Arábica - Mercado Físico
# (Tipo 6/7)" table structure + date-in-URL backfill range. No DB, no commits.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install beautifulsoup4
      - name: Probe físico
        run: python backend/scraper/probe_fisico.py
