name: "1.95 – Backfill KC at RC Close (one-shot)"

# Manual one-shot: seeds kc_at_rc_close_history.json from ~2y of hourly KC
# bars so the open-direction model's kc_after_rc_diff feature can activate
# immediately instead of waiting weeks for the forward capture (0.2) to
# accumulate. See backend/scraper/backfill_kc_at_rc_close.py.
#
# Source is Yahoo Finance hourly bars. Yahoo blocks/rate-limits some cloud
# IPs and is intermittent on GH Actions; the script retries both Yahoo hosts
# and exits non-zero if unreachable, in which case run it locally instead
# (laptop / any host with Yahoo access) and commit the result.
#
# workflow_dispatch ONLY — never scheduled. Re-runnable: it merges, never
# duplicates, and never overwrites a precise forward capture.

on:
  workflow_dispatch:

concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Backfill from hourly KC bars
        working-directory: backend
        run: python -m scraper.backfill_kc_at_rc_close

      - name: Commit seeded history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/kc_at_rc_close_history.json
          git diff --cached --quiet \
            && echo "No new backfill rows." \
            || (git commit -m "data: backfill KC at RC close (hourly) [skip ci]" \
                && git pull --rebase --autostash --strategy-option=theirs origin main \
                && git push)
