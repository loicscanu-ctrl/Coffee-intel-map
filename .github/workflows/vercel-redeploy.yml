name: "1.11 – Daily Vercel Redeploy"

# WHY: the daily data-producing workflows (1.4 export, 1.7 cecafe, 1.10 weather,
# 1.3 OI, …) commit refreshed JSON to main with "[skip ci]". Vercel skips
# "[skip ci]" commits, so production only rebuilds when *code* is merged — which
# left the dashboard's data (cecafe, prices, OI, weather) stale between merges.
#
# This pings a Vercel Deploy Hook once a day, after the data scrapers have run
# and committed, so the latest committed JSON is published. One deploy/day.
#
# SETUP (one-time): in Vercel → Project → Settings → Git → Deploy Hooks, create
# a hook for the production branch and store its URL as the repo secret
# VERCEL_DEPLOY_HOOK. Until that secret exists this workflow no-ops safely.

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC — after 1.4 (02:30), 1.10 (05:40), 1.7 (09:00) + margin
  workflow_dispatch:        # manual redeploy from the Actions tab

concurrency:
  group: vercel-redeploy
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret is not set — skipping (no deploy triggered)."
            echo "Create a Deploy Hook in Vercel and add it as the VERCEL_DEPLOY_HOOK secret."
            exit 0
          fi
          echo "Pinging Vercel deploy hook…"
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          # Deploy hooks return 201 (created) on success.
          if [ "$code" != "201" ] && [ "$code" != "200" ]; then
            echo "::error::Vercel deploy hook returned HTTP $code"
            exit 1
          fi
          echo "Deploy triggered."

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 ${{ github.workflow }} failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
