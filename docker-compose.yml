services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-coffee_intel}
      POSTGRES_USER:     ${POSTGRES_USER:-coffee}
      # No default — compose will refuse to start if unset, so a misconfigured
      # prod deploy fails loudly instead of using a public test password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set in .env)}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee -d coffee_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./backend:/app
      - ./countries.json:/app/seed/countries.json
      - ./factories.json:/app/seed/factories.json
      - ./global.json:/app/seed/global.json

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
