services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: coffee_intel
      POSTGRES_USER: coffee
      POSTGRES_PASSWORD: coffee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://coffee:coffee@db:5432/coffee_intel
    depends_on:
      - db
    restart: on-failure
    volumes:
      - ./backend:/app
      - ./countries.json:/app/seed/countries.json
      - ./factories.json:/app/seed/factories.json
      - ./global.json:/app/seed/global.json

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    environment:
      DATABASE_URL: postgresql://coffee:coffee@db:5432/coffee_intel
    depends_on:
      - db
    restart: on-failure

volumes:
  pgdata:
